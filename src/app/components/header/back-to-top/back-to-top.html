<div class="fixed top-1/2 end-4 z-[100] flex flex-col items-center space-y-3 -translate-y-1/2">
    <!-- Top Button -->
    <a id="topButton" href="#top" (click)="scrollToTop()" class="relative flex flex-col items-center justify-center px-1.75 pb-4 pt-2.5 
           bg-body-bg rounded-full border border-border
           transition text-xs font-medium text-default-700 overflow-hidden duration-300" [class.opacity-0]="!showButton" [class.pointer-events-none]="!showButton" [class.opacity-100]="showButton">
        <iconify-icon icon="lucide:arrow-up" class="text-base mb-1"></iconify-icon>
        <span class="[writing-mode:vertical-rl] [text-orientation:mixed] rotate-180 uppercase">
            Top
        </span>
        <svg class="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 32 76" fill="none">
            <rect id="scrollProgress" x=".75" y=".75" width="30.5" height="75" rx="15.25" stroke="currentColor" stroke-width="1.5" fill="none" [attr.stroke-dasharray]="totalLength" [attr.stroke-dashoffset]="dashOffset" />
        </svg>
    </a>
</div>
