<!-- Navbar -->
<header>
    <div class="navbar bg-transparent fixed transition-all top-0 inset-x-0 w-screen z-20 duration-300" [ngClass]="{
    'bg-white shadow-sm dark:bg-[#121519]': isSticky,
    'bg-transparent': !isSticky
  }">
        <div class="container">
            <div class="md:grid lg:grid-cols-5 grid-cols-3 flex items-center justify-between py-3 lg:py-3.5">
                <div class="flex items-center lg:hidden">
                    <button type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="topbar" data-hs-overlay="#topbar">
                        <lucide-icon name="menu" class="text-default-950 size-7"></lucide-icon>
                    </button>
                </div>

                <div class="py-1">
                    <a class="inline-flex items-center text-default-900" routerLink="/">
                        <span class="shrink-0 text-primary rtl-flip me-2 md:block hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" width="35" height="34">
                                <path d="M34.5 16.894v10.731c0 3.506-2.869 6.375-6.375 6.375H17.5h-.85C7.725 33.575.5 26.138.5 17c0-9.35 7.65-17 17-17s17 7.544 17 16.894z" fill="currentColor"></path>
                                <g fill-rule="evenodd">
                                    <path d="M17.5 13.258c-3.101 0-5.655 2.554-5.655 5.655s2.554 5.655 5.655 5.655 5.655-2.554 5.655-5.655-2.554-5.655-5.655-5.655zm-9.433 5.655c0-5.187 4.246-9.433 9.433-9.433s9.433 4.246 9.433 9.433a9.36 9.36 0 0 1-1.569 5.192l2.397 2.397a1.89 1.89 0 0 1 0 2.671 1.89 1.89 0 0 1-2.671 0l-2.397-2.397a9.36 9.36 0 0 1-5.192 1.569c-5.187 0-9.433-4.246-9.433-9.433z" fill="#000" fill-opacity=".05"></path>
                                    <g fill="#fff">
                                        <path d="M17.394 10.153c-3.723 0-6.741 3.018-6.741 6.741s3.018 6.741 6.741 6.741 6.741-3.018 6.741-6.741-3.018-6.741-6.741-6.741zM7.347 16.894A10.05 10.05 0 0 1 17.394 6.847 10.05 10.05 0 0 1 27.44 16.894 10.05 10.05 0 0 1 17.394 26.94 10.05 10.05 0 0 1 7.347 16.894z"></path>
                                        <path d="M23.025 22.525c.645-.645 1.692-.645 2.337 0l3.188 3.188c.645.645.645 1.692 0 2.337s-1.692.645-2.337 0l-3.187-3.187c-.645-.646-.645-1.692 0-2.337z"></path>
                                    </g>
                                </g>
                                <path d="M23.662 14.663c2.112 0 3.825-1.713 3.825-3.825s-1.713-3.825-3.825-3.825-3.825 1.713-3.825 3.825 1.713 3.825 3.825 3.825z" fill="#fff"></path>
                                <path fill-rule="evenodd" d="M23.663 8.429a2.41 2.41 0 0 0-2.408 2.408 2.41 2.41 0 0 0 2.408 2.408 2.41 2.41 0 0 0 2.408-2.408 2.41 2.41 0 0 0-2.408-2.408zm-5.242 2.408c0-2.895 2.347-5.242 5.242-5.242s5.242 2.347 5.242 5.242-2.347 5.242-5.242 5.242-5.242-2.347-5.242-5.242z" fill="currentColor"></path>
                            </svg>
                        </span>
                        <span class="text-2xl font-semibold text-default-900 dark:text-white">Finder</span>
                    </a>
                </div>

                <div class="lg:block hidden lg:col-span-3 ms-8">
                    <app-navbar-menu />
                </div>

                <div>
                    <div class="flex justify-end items-center gap-4">
                        <app-theme-dropdown />

                        <div class="flex items-center gap-2.5">
                            <a routerLink="/account/signin" class="border border-default-800 hover:bg-default-800 text-default-800 hover:text-default-50 inline-flex items-center gap-2 justify-center text-sm font-medium rounded-lg px-5 py-2.5 transition-all duration-300 text-nowrap">
                                <lucide-icon name="user-round" class="size-4"></lucide-icon>
                                Sign in
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="topbar" class="hs-overlay hs-overlay-open:translate-x-0 hidden -translate-x-full fixed top-0 start-0 transition-all duration-300 transform h-full max-w-xs w-full z-80 bg-body-bg border-s border-border" role="dialog" tabindex="-1" aria-labelledby="topbarlabel">
        <div class="flex flex-col h-full">
            <div class="py-4 px-6 flex items-center justify-between">
                <h3 id="topbarlabel" class="text-xl font-medium text-default-900">
                    Browser Finder
                </h3>

                <lucide-icon name="x" class="size-4.5" aria-label="Close" data-hs-overlay="#topbar"></lucide-icon>
            </div>

            <div class="flex-1 pt-2 pb-6 px-6 h-full overflow-y-auto">
                <app-mobile-menu />
            </div>
        </div>
    </div>
</header>


<app-back-to-top />
