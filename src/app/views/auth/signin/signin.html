<div class="max-w-480 lg:ps-12 lg:pe-6 px-4 flex">
        <div class="w-104 py-6 lg:me-12 lg:ms-auto mx-auto flex flex-col justify-between">
            <header>
                <a class="inline-flex items-center text-dark-emphasis lg:mb-6 mb-4 pb-6 pt-2.5" routerLink="/">
                    <span class="shrink-0 text-primary rtl-flip me-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="35" height="34">
                            <path d="M34.5 16.894v10.731c0 3.506-2.869 6.375-6.375 6.375H17.5h-.85C7.725 33.575.5 26.138.5 17c0-9.35 7.65-17 17-17s17 7.544 17 16.894z" fill="currentColor"></path>
                            <g fill-rule="evenodd">
                                <path d="M17.5 13.258c-3.101 0-5.655 2.554-5.655 5.655s2.554 5.655 5.655 5.655 5.655-2.554 5.655-5.655-2.554-5.655-5.655-5.655zm-9.433 5.655c0-5.187 4.246-9.433 9.433-9.433s9.433 4.246 9.433 9.433a9.36 9.36 0 0 1-1.569 5.192l2.397 2.397a1.89 1.89 0 0 1 0 2.671 1.89 1.89 0 0 1-2.671 0l-2.397-2.397a9.36 9.36 0 0 1-5.192 1.569c-5.187 0-9.433-4.246-9.433-9.433z" fill="#000" fill-opacity=".05"></path>
                                <g fill="#fff">
                                    <path d="M17.394 10.153c-3.723 0-6.741 3.018-6.741 6.741s3.018 6.741 6.741 6.741 6.741-3.018 6.741-6.741-3.018-6.741-6.741-6.741zM7.347 16.894A10.05 10.05 0 0 1 17.394 6.847 10.05 10.05 0 0 1 27.44 16.894 10.05 10.05 0 0 1 17.394 26.94 10.05 10.05 0 0 1 7.347 16.894z"></path>
                                    <path d="M23.025 22.525c.645-.645 1.692-.645 2.337 0l3.188 3.188c.645.645.645 1.692 0 2.337s-1.692.645-2.337 0l-3.187-3.187c-.645-.646-.645-1.692 0-2.337z"></path>
                                </g>
                            </g>
                            <path d="M23.662 14.663c2.112 0 3.825-1.713 3.825-3.825s-1.713-3.825-3.825-3.825-3.825 1.713-3.825 3.825 1.713 3.825 3.825 3.825z" fill="#fff"></path>
                            <path fill-rule="evenodd" d="M23.663 8.429a2.41 2.41 0 0 0-2.408 2.408 2.41 2.41 0 0 0 2.408 2.408 2.41 2.41 0 0 0 2.408-2.408 2.41 2.41 0 0 0-2.408-2.408zm-5.242 2.408c0-2.895 2.347-5.242 5.242-5.242s5.242 2.347 5.242 5.242-2.347 5.242-5.242 5.242-5.242-2.347-5.242-5.242z" fill="currentColor"></path>
                        </svg>
                    </span>
                    <span class="text-2xl font-semibold text-default-900">Finder</span>
                </a>
            </header>

            <div>
                <h1 class="mb-4 text-default-900 font-semibold lg:text-3.5xl md:text-2.5xl text-2xl">Welcome back</h1>
                <div class="flex text-sm mb-6">
                    Don't have an account?
                    <a class="underline hover:no-underline font-semibold text-body-color ms-2" routerLink="/account/signup">Create an account</a>
                </div>

                <div class="mb-6">
                    <input type="text" placeholder="Email" class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75">
                </div>

                <div class="mb-6 relative">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Password"
                        class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75 pe-12"
                    >

                    <button 
                        type="button"
                        data-hs-toggle-password='{
                            "target": "#password"
                        }'
                        class="absolute inset-y-0 end-0 flex items-center z-20 px-3 cursor-pointer"
                    >
                        <iconify-icon 
                            icon="lucide:eye" 
                            class="size-4 hs-password-active:hidden block"
                        ></iconify-icon>

                        <iconify-icon 
                            icon="lucide:eye-off" 
                            class="size-4 hs-password-active:block hidden"
                        ></iconify-icon>
                    </button>
                </div>

                <div class="mb-6 flex justify-between items-center">
                    <label for="dealer-ready" class="flex items-center me-2 mb-1 text-default-700 text-sm cursor-pointer checked:text-default-800">
                        <input type="checkbox" id="dealer-ready" class="size-4 checked:text-dark border-default-300 dark:bg-body-bg rounded me-2">
                        Remember for 30 days
                    </label>

                    <a class="text-sm font-semibold text-default-700 hover:text-default-900" routerLink="/account/password-recovery">
                        <span>Forgot password?</span>
                    </a>
                </div>

                <button type="submit" class="py-3.5 px-6 text-white bg-primary inline-flex justify-center font-semibold w-full rounded-md transition hover:bg-primary-hover">Sign in</button>

                <div class="flex items-center my-6">
                    <hr class="w-full text-default-200 dark:text-white/20">
                    <span class="text-default-900 font-medium text-nowrap mx-6">or continue with</span>
                    <hr class="w-full text-default-200 dark:text-white/20">
                </div>

                <div class="lg:mb-6 mb-4 pb-6 gap-4 flex md:flex-nowrap flex-wrap">
                    <button type="button" class="py-3.5 px-2 w-full text-default-600 rounded-md border border-border transition hover:border-default-900 inline-flex items-center justify-center font-semibold">
                        <iconify-icon icon="tabler:brand-google-filled" class="ms-1 me-1"></iconify-icon>Google
                    </button>

                    <button type="button" class="py-3.5 px-2 w-full text-default-600 rounded-md border border-border transition hover:border-default-900 inline-flex items-center justify-center font-semibold">
                        <iconify-icon icon="tabler:brand-facebook-filled" class="ms-1 me-1"></iconify-icon>Facebook
                    </button>

                    <button type="button" class="py-3.5 px-2 w-full text-default-600 rounded-md border border-border transition hover:border-default-900 inline-flex items-center justify-center font-semibold">
                        <iconify-icon icon="tabler:brand-apple-filled" class="ms-1 me-1"></iconify-icon>Apple
                    </button>
                </div>
            </div>

            <footer>
                <a class="mb-6 block underline hover:no-underline text-sm font-medium hover:text-default-900" routerLink="/help/topics/v1">Need help?</a>
                <p class="text-xs">
                    © All rights reserved. Made by <a class="hover:underline text-default-900" [routerLink]="[]" target="_blank" rel="noreferrer">Coderthemes</a>
                </p>
            </footer>
        </div>

        <div class="max-w-258.5 ms-auto py-6 lg:block hidden">
            <div class="flex flex-col justify-end h-full bg-info-subtle rounded-2xl bg-default-100 dark:bg-white/3">
                <div>
                    <img src="assets/img/account/account-cover.png" alt="Girl">
                </div>
            </div>
        </div>
    </div>
