<section class="lg:pb-14 lg:pt-28 md:pt-14 pt-12 pb-12">
  <div class="container">
    <div class="flex items-start justify-between gap-4 lg:mb-10 md:mb-8 mb-6">
      <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl font-semibold text-default-900">
        Popular car body types
      </h2>
      <div class="inline-flex items-center gap-2">
        <a
          [routerLink]="[]"
          class="hover:underline flex items-center text-nowrap me-1 font-semibold"
          >View all
          <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
        </a>
      </div>
    </div>

    <div class="swiper">
      <swiper-container [config]="swiperConfig" init="false" class="lg:mb-0 mb-12">
        @for (item of categoriesData; track $index) {
          <swiper-slide>
            <a [routerLink]="item.link" class="group">
              <div class="bg-default-100 dark:bg-white/3 px-4 py-6 group rounded-xl">
                <img
                  [src]="item.image"
                  [alt]="item.title"
                  class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 z-0"
                />

                <h3 class="text-default-800 font-semibold text-center pt-4 mb-1">
                  <a
                    class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300"
                    [routerLink]="item.link"
                  >
                    {{ item.title }}
                  </a>
                </h3>

                <p class="text-sm mb-2 text-center">
                  {{ item.offers }}
                </p>
              </div>
            </a>
          </swiper-slide>
        }
      </swiper-container>
      <!-- Pagination (Bullets) -->
      <div id="category-pagination" class="swiper-pagination static mt-3"></div>
    </div>
  </div>
</section>
