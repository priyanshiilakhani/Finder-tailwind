<section class="lg:py-14 pt-2 pb-12">
        <div class="container">
            <div class="flex justify-between mb-6 md:mb-8 flex-wrap gap-4">
                <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl font-semibold text-default-900">Latest cars</h2>
                <ul class="inline-flex gap-2 overflow-x-auto">
                    <li>
                        <a [routerLink]="[]" class="border border-dark bg-default-100 inline-flex rounded-full dark:border-white text-default-900 py-2.5 px-5 text-sm font-medium">All</a>
                    </li>

                    <li>
                        <a [routerLink]="[]" class="border border-default-300 inline-flex dark:border-white/20 transition-all duration-300 hover:border-dark rounded-full hover:dark:border-white text-default-900 py-2.5 px-5 text-sm font-medium">New cars</a>
                    </li>

                    <li>
                        <a [routerLink]="[]" class="border border-default-300 inline-flex dark:border-white/20 transition-all duration-300 hover:border-dark rounded-full hover:dark:border-white text-default-900 py-2.5 px-5 text-sm font-medium">Used cars</a>
                    </li>
                </ul>
            </div>

            <div class="swiper">
                <swiper-container [config]="swiperConfig" init="false"  class="lg:mb-0 mb-12">
                    @for (car of carListingData; track $index) {

                        <swiper-slide class="h-auto group">
                        <a routerLink="/single-entry-cars" class="group">

                            <div class="border border-border rounded-md">

                            <div class="rounded-tl-md rounded-tr-md w-full h-full overflow-hidden relative">

                                <img
                                [src]="car.image"
                                alt="Image"
                                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 z-0 rounded-tl-md rounded-tr-md"
                                >

                                <div class="absolute top-0 start-0 z-10 flex flex-col gap-1 pt-2 ps-2 mt-2 ms-2">

                                @if (car.verified) {
                                    <div class="bg-info text-white text-xs inline-flex item-center font-medium px-2 py-0.5 rounded items-center">
                                    Verified
                                    <iconify-icon icon="lucide:shield" class="ms-1"></iconify-icon>
                                    </div>
                                }

                                <div>
                                    <p
                                    class="inline-flex w-auto text-white text-xs px-2 py-0.5 rounded"
                                    [class]="car.badgeColor"
                                    >
                                    {{ car.badge }}
                                    </p>
                                </div>

                                </div>
                            </div>

                            <div class="pb-4 pt-6 px-6">

                                <div class="flex justify-between items-center mb-2">

                                <div class="text-xs text-secondary me-4">
                                    {{ car.date }}
                                </div>

                                <div class="flex gap-2">

                                    <div class="hs-tooltip [--placement:top] inline-block">
                                    <button
                                        type="button"
                                        class="hs-tooltip-toggle flex justify-center items-center size-8 border border-default-300 dark:border-white/20 rounded-full hover:border-body-color transition-all duration-300"
                                    >
                                        <iconify-icon
                                        icon="lucide:heart"
                                        width="14"
                                        height="14"
                                        class="text-body-color"
                                        ></iconify-icon>

                                        <span
                                        class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-body-bg rounded-md"
                                        role="tooltip"
                                        >
                                        Wishlist
                                        </span>
                                    </button>
                                    </div>

                                    <div class="hs-tooltip [--placement:top] inline-block">
                                    <button
                                        type="button"
                                        class="hs-tooltip-toggle flex justify-center items-center size-8 border border-default-300 dark:border-white/20 rounded-full hover:border-body-color transition-all duration-300"
                                    >
                                        <iconify-icon
                                        icon="lucide:bell"
                                        width="14"
                                        height="14"
                                        class="text-body-color"
                                        ></iconify-icon>

                                        <span
                                        class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-body-bg rounded-md"
                                        role="tooltip"
                                        >
                                        Notify
                                        </span>
                                    </button>
                                    </div>

                                    <div class="hs-tooltip [--placement:top] inline-block">
                                    <button
                                        type="button"
                                        class="hs-tooltip-toggle flex justify-center items-center size-8 border border-default-300 dark:border-white/20 rounded-full hover:border-body-color transition-all duration-300"
                                    >
                                        <iconify-icon
                                        icon="lucide:repeat"
                                        width="14"
                                        height="14"
                                        class="text-body-color"
                                        ></iconify-icon>

                                        <span
                                        class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-body-bg rounded-md"
                                        role="tooltip"
                                        >
                                        Compare
                                        </span>
                                    </button>
                                    </div>

                                </div>
                                </div>

                                <h3 class="mb-2 text-default-900 font-semibold">
                                <a
                                    class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300 me-1"
                                    routerLink="/single-entry-cars"
                                >
                                    {{ car.title }}
                                </a>

                                <span class="text-xs font-normal text-secondary">
                                    ({{ car.year }})
                                </span>
                                </h3>

                                <div class="text-default-900 font-semibold">
                                {{ car.price }}
                                </div>

                            </div>

                            <div class="pb-6 px-6">

                                <div class="pt-4 border-t border-border">

                                <div class="grid grid-cols-2 gap-2">

                                    <div class="flex gap-2 items-center text-sm">
                                    <iconify-icon
                                        icon="lucide:map-pin"
                                        class="text-body-color"
                                    ></iconify-icon>

                                    {{ car.location }}
                                    </div>

                                    <div class="flex gap-2 items-center text-sm">
                                    <iconify-icon
                                        icon="lucide:gauge"
                                        class="text-body-color"
                                    ></iconify-icon>

                                    {{ car.mileage }}
                                    </div>

                                    <div class="flex gap-2 items-center text-sm">
                                    <iconify-icon
                                        icon="lucide:fuel"
                                        class="text-body-color"
                                    ></iconify-icon>

                                    {{ car.fuel }}
                                    </div>

                                    <div class="flex gap-2 items-center text-sm">
                                    <iconify-icon
                                        icon="tabler:manual-gearbox"
                                        class="text-body-color"
                                    ></iconify-icon>

                                    {{ car.transmission }}
                                    </div>

                                </div>

                                </div>

                            </div>

                            </div>

                        </a>
                        </swiper-slide>

                    }
                   </swiper-container>
                
                <div id="listing-pagination" class="swiper-pagination static mt-3 mt-lg-4"></div>
            </div>
        </div>
    </section>
