<section class="relative">
    <div class="container">
        <div class="flex items-center justify-between md:mb-12 mb-6">
            <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl text-default-900 font-semibold">Popular activities</h2>
            <div class="inline-flex items-center gap-2">
                <a routerLink="/listings-events" class="hover:underline flex items-center py-2 font-semibold">View all
                    <lucide-icon name="chevron-right" class="size-4.5 ms-1"></lucide-icon>
                </a>
            </div>
        </div>

        <div class="swiper">

            <swiper-container class="lg:mb-0 mb-12" [config]="swiperConfig" init="false">

                @for (item of activitiesData; track $index) {
                <swiper-slide class="h-auto">
                    <div class="group">
                        <a [routerLink]="item.link">
                            <div class="border-default-200 border dark:border-white/20 group rounded-md">

                                <div class="rounded-tl-md rounded-tr-md overflow-hidden relative">
                                    <img [src]="item.image" [alt]="item.title" class="w-full h-full object-cover transition-transform duration-500 rounded-tl-md rounded-tr-md group-hover:scale-105 z-0">

                                    <div class="absolute top-0 end-0 z-10 opacity-0 group-hover:opacity-100 transition pt-2 pe-2 mt-2 me-2">
                                        <button type="button" class="size-8 bg-white text-default-700 rounded-full shadow flex items-center justify-center">
                                            <iconify-icon icon="lucide:heart"></iconify-icon>
                                        </button>
                                    </div>
                                </div>

                                <div class="pt-4 pb-2 px-4">
                                    <span class="rounded-md inline-block font-medium text-default-600 bg-default-100 dark:bg-white/3 text-xs px-2 py-1 text-decoration-none mb-2">
                                        {{ item.category }}
                                    </span>

                                    <h3 class="text-xl font-semibold pt-1 mb-2">
                                        <a class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300" [routerLink]="item.link">
                                            {{ item.title }}
                                        </a>
                                    </h3>

                                    <p class="text-sm">{{ item.description }}</p>
                                </div>

                                <div class="pb-4 px-4">
                                    <ul class="flex-nowrap flex gap-4 text-sm items-center">

                                        <li class="flex items-center gap-1">
                                            <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>

                                            <span class="text-sm">{{ item.rating }}</span>

                                            <span class="text-xs text-secondary">
                                                ({{ item.reviews }})
                                            </span>
                                        </li>

                                        <li class="flex items-center gap-1">
                                            <lucide-icon name="map-pin" class="size-3.5"></lucide-icon>

                                            <span>{{ item.distance }}</span>
                                        </li>
                                    </ul>

                                    <div class="text-default-900 font-semibold pt-4">
                                        {{ item.price }}
                                    </div>
                                </div>

                            </div>
                        </a>
                    </div>
                </swiper-slide>
                }

            </swiper-container>
            <!-- Pagination (Bullets) -->
            <div id="activities-pagination" class="swiper-pagination position-static mt-3 mt-sm-4"></div>
        </div>
    </div>
    <span class="absolute lg:block hidden bg-emerald-50 dark:bg-default-200 rounded-full -top-9.75 start-40 w-24.5 h-24.5"></span>
    <span class="absolute lg:block hidden bg-emerald-50 dark:bg-default-200 rounded-full bottom-25.75 end-35 w-8.5 h-8.5"></span>
    <span class="absolute lg:block hidden bg-warning/10 rounded-full -bottom-3.25 end-37.5 w-24.5 h-24.5"></span>
</section>
