<section class="lg:py-24 md:py-18 py-14 relative">
    <div class="container">
        <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl text-default-900 font-semibold mb-8">What's new in Barcelona</h2>

        <div class="grid md:grid-cols-12 grid-cols-1 gap-6 lg:items-center items-start">
            <div class="md:col-span-5 col-span-1">
                <div>
                    <div class="swiper size-full" id="images">
                        <swiper-container #imageSwiper [config]="swiperConfig" init="false">
                            @for (item of swiperData; track $index) {
                            <swiper-slide>
                                <img [src]="item.image" class="size-full rounded-md object-fit-cover" alt="Image">
                            </swiper-slide>
                            }
                        </swiper-container>
                    </div>
                </div>
            </div>

            <div class="md:col-span-7 col-span-1 lg:ps-0 md:ps-6">
                <div class="lg:w-160 w-full lg:ms-24">
                    <div class="swiper">
                        <div class="flex gap-2 lg:mb-8 mb-6">
                            <button type="button" class="size-10 flex items-center border border-default-300 dark:border-white/20 bg-body-bg rounded-full justify-center me-1" id="new-prev" aria-label="Prev">
                                <iconify-icon icon="lucide:chevron-left" height="18" width="18"></iconify-icon>
                            </button>

                            <button type="button" class="size-10 flex items-center justify-center border border-default-300 bg-body-bg dark:border-white/20 rounded-full" id="new-next" aria-label="Next">
                                <iconify-icon icon="lucide:chevron-right" height="18" width="18"></iconify-icon>
                            </button>
                        </div>

                        <swiper-container #contentSwiper class="lg:py-8" [config]="swiperConfigs" init="false">
                            @for (item of swiperData; track $index) {
                            <swiper-slide>
                                <h3 class="lg:text-3.5xl md:text-2.5xl text-2xl mb-4">
                                    {{ item.title }}
                                </h3>

                                <div class="flex items-center gap-4 md:mb-6 mb-4">
                                    <div class="flex items-center gap-1">
                                        <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>

                                        <span class="text-sm text-default-500">
                                            {{ item.rating }}
                                        </span>

                                        <span class="text-xs text-default-400 self-end">
                                            ({{ item.reviews }})
                                        </span>
                                    </div>

                                    <div class="flex items-center gap-1 text-sm">
                                        <lucide-icon name="credit-card" class="size-3.5"></lucide-icon>

                                        {{ item.price }}
                                    </div>

                                    <div class="flex items-center gap-1 text-sm">
                                        <lucide-icon name="map-pin" class="size-3.5"></lucide-icon>

                                        <span class="text-truncate">
                                            {{ item.distance }}
                                        </span>
                                    </div>
                                </div>

                                <p class="lg:mb-8 mb-4">
                                    {{ item.description }}
                                </p>

                                <a [routerLink]="item.link" class="inline-flex items-center gap-1 bg-primary text-white md:px-6 md:py-3.5 py-2.5 px-5 rounded-full font-semibold md:text-base text-sm transition-all duration-300 hover:bg-primary-hover">

                                    View more

                                    <iconify-icon icon="lucide:chevron-right" class="text-xl -me-1">
                                    </iconify-icon>
                                </a>
                            </swiper-slide>
                            }
                        </swiper-container>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <span class="absolute bg-primary/20 rounded-full -z-10 hidden lg:block bottom-15 end-122.5 w-15 h-15"></span>
    <span class="absolute bg-emerald-50 dark:bg-default-200 rounded-full -z-10 hidden lg:block bottom-30 end-137.5 w-6.75 h-6.75"></span>
</section>
