<section>
    <div class="container">
        <div class="flex items-center justify-between mb-12">
            <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl text-default-900 font-semibold">Where to eat</h2>
            <div class="inline-flex items-center gap-2">
                <a routerLink="/listings-events" class="hover:underline flex items-center py-2 font-semibold">View all
                    <lucide-icon name="chevron-right" class="size-4.5 ms-1"></lucide-icon>
                </a>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-6">
            @for (item of restaurantListData; track $index) {
            <div class="group">
                <a [routerLink]="item.link">
                    <div class="flex gap-4">
                        <div class="bg-default-100 dark:bg-white/3 rounded-md py-4 px-6">
                            <div class="rounded-md w-16 overflow-hidden relative">

                                @if (item.image) {
                                <img [src]="item.image" alt="Image" class="w-64 object-cover overflow-hidden transition-transform duration-500 group-hover:scale-105 z-0 rounded-md">
                                }

                                @if (item.lightImage && item.darkImage) {
                                <img [src]="item.lightImage" alt="Image" class="w-64 object-cover overflow-hidden transition-transform duration-500 group-hover:scale-105 z-0 rounded-md block dark:hidden">

                                <img [src]="item.darkImage" alt="Image" class="w-64 object-cover overflow-hidden transition-transform duration-500 group-hover:scale-105 z-0 rounded-md hidden dark:block">
                                }
                            </div>
                        </div>

                        <div class="pt-1">
                            <h3 class="text-base font-semibold mb-1">
                                <a class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300" [routerLink]="item.link">
                                    {{ item.title }}
                                </a>
                            </h3>

                            <div class="flex items-center gap-1 mb-2">
                                <lucide-icon name="star" class="fill-warning text-warning size-4">
                                </lucide-icon>

                                <span class="text-sm">{{ item.rating }}</span>

                                <span class="text-xs text-secondary self-end">
                                    ({{ item.reviews }})
                                </span>
                            </div>

                            <ul class="flex-nowrap flex gap-2 text-sm mb-0">
                                <li class="flex items-center gap-1 me-2">
                                    <lucide-icon name="credit-card" class="size-3.5">
                                    </lucide-icon>

                                    {{ item.price }}
                                </li>

                                <li class="flex items-center gap-1">
                                    <lucide-icon name="map-pin" class="size-3.5">
                                    </lucide-icon>

                                    <span>{{ item.distance }}</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </a>
            </div>
            }
        </div>
    </div>
</section>
