<section class="lg:py-24 md:py-18 py-14">
    <div class="container">
        <div class="flex md:items-center items-start justify-between gap-4 lg:mb-10 md:mb-8 mb-6">
            <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl font-semibold text-default-900">Browse pros in your area</h2>
            <div class="inline-flex items-center gap-2 ">
                <a [routerLink]="[]" class="hover:underline flex items-center text-nowrap me-1 font-semibold">View all
                    <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
                </a>
            </div>
        </div>

        <div class="grid lg:grid-cols-4 md:grid-cols-3 grid-cols-1 md:gap-6 gap-3">

            @for (item of categoriesData; track $index) {
            <div class="group">
                <a [routerLink]="item.link" class="group">

                    <div class="flex gap-4 items-center">
                        <div class="size-14 bg-default-100 dark:bg-white/3 rounded-full flex items-center justify-center group-hover:scale-105 transition-all duration-300 ease-in-out" [innerHTML]="getSafeSvg(item.svg)">

                        </div>

                        <h3 class="text-default-900 font-normal group-hover:underline transition-all duration-300 ease-in-out"><a [routerLink]="item.link">{{item.title}}</a></h3>
                    </div>
                </a>
            </div>
            }

        </div>
    </div>
</section>
