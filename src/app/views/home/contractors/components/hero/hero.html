<section class="relative bg-info dark overflow-hidden lg:py-18 md:py-4 lg:mt-20 mt-15">
    <div class="container relative z-10 pb-2 py-4 md:py-10">
        <div class="mx-auto py-8 lg:py-12" style="max-width: 630px">
            <h1 class="text-white text-center md:mb-12 mb-8 md:text-4.8xl text-3.5xl lg:text-5.5xl font-bold">
                Explore top-rated certified pros nearby
            </h1>

            <form class="bg-white border rounded-xl p-2 mb-6 md:mb-12">
                <div class="flex flex-col md:flex-row gap-3 p-1">
                    <div class="flex flex-col sm:flex-row w-full gap-2 sm:gap-3">
                        <div class="relative w-full">
                            <iconify-icon icon="lucide:search" height="20" width="20" class="absolute top-1/2 start-0 -translate-y-1/2 text-lg text-default-100 ms-2"></iconify-icon>
                            <input type="search" placeholder="What service do you need?" required class="w-full border-0 rounded-none ps-9 py-3 text-lg focus:outline-none">
                        </div>

                        <hr class="sm:hidden m-0">
                        <div class="hidden sm:block my-2 w-px bg-default-300"></div>
                        <div class="relative w-full sm:max-w-[150px]">
                            <iconify-icon icon="lucide:map-pin" height="20" width="20" class="absolute top-1/2 start-0 -translate-y-1/2 text-lg text-default-100 ms-2"></iconify-icon>
                            <input type="text" placeholder="Zip code" required class="w-full border-0 rounded-none pe-0 ps-9 py-3 text-lg focus:outline-none">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-lg btn-primary px-6 py-3.5 font-semibold rounded-md bg-primary text-white hover:bg-primary/90 transition">
                        Search
                    </button>
                </div>
            </form>

            <div class="flex flex-wrap justify-center gap-2 pt-2 md:pt-0">
                @for (item of servicesData; track $index) {
                <button type="button" class="border border-white text-white rounded-full py-2.5 px-5 font-medium text-sm hover:bg-white hover:text-black transition">{{item}}</button>
                }

            </div>
        </div>
    </div>

    <div class="absolute top-1/2 start-1/2 -translate-x-1/2 -translate-y-1/2">
        <div class="2xl:hidden" style="width: 1780px"></div>
        <div class="hidden 2xl:block" style="width: 2157px"></div>
        <img src="assets/img/home/contractors/hero.png" alt="Image">
    </div>
</section>
