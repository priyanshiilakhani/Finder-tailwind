<section class="lg:py-24 md:py-18 py-14">
    <div class="container">
        <div class="flex md:items-center items-start justify-between gap-4 lg:mb-10 md:mb-8 mb-6">
            <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl font-semibold text-default-900">Popular home projects</h2>
            <div class="inline-flex items-center gap-2 ">
                <a [routerLink]="[]" class="hover:underline flex items-center text-nowrap me-1 font-semibold">View all
                    <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
                </a>
            </div>
        </div>

        <div class="swiper pb-5">
            <swiper-container class="lg:mb-0 mb-15" [config]="swiperConfig" init="false">
                @for (item of homeProjectsData; track $index) {
                <swiper-slide>
                    <div class="group">
                        <a [routerLink]="item.link" class="group">
                            <div class="border border-default-300 dark:border-white/20 group rounded-md">

                                <div class="rounded-tr-md rounded-tl-md overflow-hidden group relative">
                                    <img [src]="item.image" alt="" class="w-full h-full object-cover transition-transform duration-500 rounded-tr-md rounded-tl-md group-hover:scale-105 z-0">

                                    <div class="absolute bottom-0 start-0 w-full h-1/3 bg-gradient-to-t from-black/60 to-transparent"></div>

                                    <div class="absolute top-0 end-0 z-10 opacity-0 group-hover:opacity-100 transition pt-2 pe-2 mt-2 me-2">
                                        <button type="button" class="size-8 bg-white text-default-700 rounded-full shadow flex items-center justify-center">

                                            <iconify-icon icon="lucide:heart"></iconify-icon>
                                        </button>
                                    </div>

                                    <h3 class="absolute bottom-0 start-0 w-full text-white text-xl font-medium p-3">
                                        {{ item.title }}
                                    </h3>
                                </div>

                                <div class="p-4">
                                    <div class="flex items-center lg:gap-4 gap-1">

                                        <div class="flex items-center gap-1">
                                            <lucide-icon name="star" class="fill-warning text-warning size-4">
                                            </lucide-icon>

                                            <span class="text-sm text-body-color">
                                                {{ item.rating }}
                                            </span>

                                            <span class="text-xs text-secondary">
                                                ({{ item.reviews }})
                                            </span>
                                        </div>

                                        <a class="text-sm text-default-900" [routerLink]="item.link">
                                            From {{ item.price }}
                                        </a>

                                        <button type="button" class="rounded-md border border-default-900 dark:border-white text-default-900 dark:text-white py-2.5 px-5 text-sm font-semibold inline-flex relative z-2 ms-auto transition-all duration-300 ease-in-out hover:bg-default-900 hover:text-white">

                                            Book now
                                        </button>

                                    </div>
                                </div>

                            </div>
                        </a>
                    </div>
                </swiper-slide>
                }

            </swiper-container>
            <!-- Pagination (Bullets) -->
            <div id="home-pagination" class="swiper-pagination static mt-3"></div>
        </div>
    </div>
</section>
