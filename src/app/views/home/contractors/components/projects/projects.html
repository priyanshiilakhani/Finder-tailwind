<section class="lg:py-4">
    <div class="container">
        <div class="grid lg:grid-cols-3 grid-cols-1 items-center gap-6">
            <div class="col-span-1 lg:block hidden">
                <div class="relative max-w-76.5">
                    <div class="relative h-full z-10 p-12 mb-3">
                        <h3 class="mb-2 text-2.5xl text-default-900 font-semibold">
                            <a [routerLink]="[]">Get matched with local pros</a>
                        </h3>
                        <p class="text-sm">for your next home project.</p>
                    </div>

                    <a [routerLink]="[]" class="block relative z-10 pb-6 ps-12 ms-4">
                        <div class="mb-2" style="width:324px;">
                            <img src="assets/img/home/contractors/banner.png" alt="Image" class="w-full h-full">
                        </div>
                    </a>

                    <span class="absolute top-0 start-0 w-full h-full bg-default-100 dark:bg-white/3 rounded-xl overflow-hidden dark:hidden">
                        <span class="absolute top-full start-0 -translate-y-1/2 bg-white/50 rounded-full -mt-5 -ms-5 xl:ms-4 size-130"></span>
                    </span>

                    <span class="absolute top-0 start-0 w-full h-full bg-default-100 dark:bg-white/3 rounded overflow-hidden hidden dark:block">
                        <span class="absolute top-full start-0 -translate-y-1/2 bg-white/10 rounded-full -mt-5 -ms-5 xl:ms-4 size-130"></span>
                    </span>
                </div>

            </div>

            <div class="lg:col-span-2 col-span-1">
                <div class="flex md:items-center items-start justify-between gap-4 lg:mb-10 md:mb-8 mb-6">
                    <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl font-semibold text-default-900">Popular projects near you</h2>
                    <div class="inline-flex items-center gap-2 ">
                        <a [routerLink]="[]" class="hover:underline flex items-center text-nowrap me-1 font-semibold">View all
                            <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
                        </a>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 grid-cols-1 gap-7">
                    @for (item of projectsData; track $index) {
                    <div class="group">
                        <a [routerLink]="item.link" class="group">
                            <div class="flex gap-4">
                                <div class="rounded-md w-28 h-auto overflow-hidden">
                                    <img [src]="item.image" alt="Category image" class="w-28 h-auto object-cover transition-transform duration-500 rounded-md group-hover:scale-110 z-0">
                                </div>

                                <div class="pt-1">
                                    <h3 class="mb-1 font-semibold text-default-900">
                                        <a class="hover:underline transition-all duration-300 ease-in-out" [routerLink]="item.link">
                                            {{ item.title }}
                                        </a>
                                    </h3>

                                    <div class="flex items-center gap-1 mb-1">
                                        <lucide-icon name="star" class="fill-warning text-warning size-4">
                                        </lucide-icon>

                                        <span class="text-sm text-body-color">
                                            {{ item.rating | number:'1.1-1'}}
                                        </span>

                                        <span class="text-xs text-secondary">
                                            ({{ item.reviews }})
                                        </span>
                                    </div>

                                    <div class="text-sm text-default-900">
                                        From {{ item.price }}
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</section>
