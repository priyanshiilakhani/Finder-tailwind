<section class="lg:py-28 md:py-18 py-12">
    <div class="container">
        <div class="flex items-start justify-between gap-4 md:mb-8 mb-6">
            <h2 class="text-default-900 lg:text-4.5xl md:text-3.5xl text-2.5xl font-semibold">Popular consultations</h2>
            <div class="inline-flex items-center gap-2 ">
                <a [routerLink]="[]" class="hover:underline flex items-center text-nowrap me-1 font-semibold">View all
                    <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
                </a>
            </div>
        </div>

        <div class="swiper pb-5">
            <swiper-container [config]="swiperConfig" init="false" class="md:mb-0 mb-8">
                @for (item of consultationData; track $index) {
                <swiper-slide class="group !h-full">
                    <a [routerLink]="item.link" class="group">
                        <div class="border border-border rounded-md">

                            <div class="rounded-tl-md rounded-tr-md w-full h-full overflow-hidden">
                                <img [src]="item.image" [alt]="item.title" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 z-0 rounded-tl-md rounded-tr-md">
                            </div>

                            <div class="p-4">
                                <h3 class="text-default-900 font-semibold text-2xl pt-1 mb-2">
                                    <a class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300" [routerLink]="item.link">
                                        {{ item.title }}
                                    </a>
                                </h3>

                                <p class="text-sm">
                                    {{ item.description }}
                                </p>
                            </div>

                            <div class="p-4 flex flex-wrap gap-3 justify-between">
                                <div class="flex items-center gap-2">
                                    <div class="text-2xl font-semibold text-default-900">
                                        {{ item.price }}
                                    </div>

                                    <del class="text-sm text-secondary">
                                        {{ item.oldPrice }}
                                    </del>
                                </div>

                                <button type="button" class="py-2.5 px-5 inline-flex border border-primary text-primary transition-all duration-300 rounded-md text-sm hover:bg-primary hover:text-white">
                                    Book an appointment
                                </button>
                            </div>

                        </div>
                    </a>
                </swiper-slide>
                }
            </swiper-container>
            <div id="consultations-pagination" class="swiper-pagination static mt-3"></div>
        </div>
    </div>
</section>
