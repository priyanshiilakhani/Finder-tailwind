<section class="lg:mt-20 md:mt-17.5 mt-16 bg-[#30536b] lg:py-24 md:py-18 py-12 dark">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 items-center md:gap-6 gap-12">
            <div class="md:col-span-7 col-span-1">
                <h1 class="lg:text-6xl md:text-5xl text-4xl md:text-start text-center font-bold text-white lg:mb-12 md:mb-10 mb-6 lg:pb-4">Trusted professionals, one click away</h1>
                <form class="bg-white border rounded-xl p-2">
                    <div class="flex flex-col lg:flex-row gap-2 p-1">
                        <div class="flex flex-col sm:flex-row w-full gap-2 sm:gap-3">
                            <div class="relative w-full flex items-center">
                                <iconify-icon icon="lucide:search" class="absolute top-1/2 start-0 -translate-y-1/2 text-default-500 text-xl ms-2"></iconify-icon>
                                <input type="search" placeholder="Search Doctors, Conditions, or Procedures" required class="w-full ps-9 pe-2 py-3 text-base border-0 rounded-none focus:ring-0 focus:outline-none" />
                            </div>

                            <hr class="sm:hidden ms-0 border-default-400">
                            <div class="hidden sm:flex items-center my-2 w-px bg-body-color"></div>
                            <div class="relative w-full max-w-47.5">
                                <iconify-icon icon="lucide:map-pin" class="absolute top-1/2 start-0 -translate-y-1/2 z-10 text-default-500 text-xl ms-2"></iconify-icon>
                                <select required class="w-full ps-9 pe-2 py-3 text-base border-0 focus:ring-0 focus:outline-none">
                                    <option value="">Location</option>
                                    <option>New York</option>
                                    <option>Los Angeles</option>
                                    <option>Chicago</option>
                                    <option>Houston</option>
                                    <option>Phoenix</option>
                                    <option>Philadelphia</option>
                                    <option>San Antonio</option>
                                    <option>San Diego</option>
                                    <option>Dallas</option>
                                    <option>San Jose</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="px-6 py-3.5 font-semibold bg-primary text-white rounded-md inline-flex justify-center transition-all duration-300 hover:bg-primary-hover">
                            Search
                        </button>
                    </div>
                </form>

                <div class="flex gap-2 text-sm pt-8 flex-wrap" data-bs-theme="dark">
                    <span class="text-white/80 me-2">Popular searches:</span>
                    <a class="hover:underline text-white me-2" [routerLink]="[]">Pediatrics</a>
                    <a class="hover:underline text-white me-2" [routerLink]="[]">Family medicine</a>
                    <a class="hover:underline text-white me-2" [routerLink]="[]">Top hospitals</a>
                    <a class="hover:underline text-white me-2" [routerLink]="[]">Best dentists</a>
                </div>
            </div>

            <div class="md:col-span-5 col-span-1">
                <div class="lg:w-104 w-full lg:ms-auto">
                    <div class="relative">
                        <div class="swiper" style="-webkit-clip-path: url(#mask); clip-path: url(#mask)">
                            <swiper-container #mainSwiper [config]="swiperConfig" init="false">
                                @for (item of heroSliderData; track $index) {
                                <swiper-slide>
                                    <div>
                                        <img [src]="item.image" [alt]="item.alt">
                                    </div>
                                </swiper-slide>
                                }

                            </swiper-container>
                        </div>

                        <svg class="absolute" xmlns="http://www.w3.org/2000/svg" width="0" height="0" viewBox="0 0 416 344" fill="none">
                            <defs>
                                <clipPath id="mask" clipPathUnits="objectBoundingBox" transform="scale(0.0024, 0.0029)">
                                    <path d="M298.045 0.00804178C263.343 -0.177193 230.353 15.0453 208 41.558C185.786 14.8641 152.705 -0.40169 117.954 0.00804178C52.8095 0.00804178 0 52.7547 0 117.821C0 229.325 194.835 338.197 202.734 342.405C205.921 344.532 210.078 344.532 213.266 342.405C221.165 338.197 416 230.902 416 117.821C416 52.7547 363.19 0.00804178 298.045 0.00804178Z"></path>
                                </clipPath>
                            </defs>
                        </svg>
                    </div>

                    <div class="mx-auto" style="max-width: 382px">
                        <div class="swiper swiper-load swiper-thumbs py-4 px-4 mt-2" id="thumbs" style="--swiper-thumbnail-border-color: rgba(255,255,255, .4); --swiper-thumbnail-active-border-color: var(--fn-info)">
                            <swiper-container #thumbSwiper [config]="swiperConfigs" init=false>
                                @for (item of heroSliderData; track $index) {
                                <swiper-slide class="swiper-thumb rounded-full p-2 relative">

                                    <div class="aspect-square rounded-full overflow-hidden">
                                        <img [src]="item.thumbnail" class="swiper-thumb-img" [alt]="item.alt">
                                    </div>

                                    <div class="absolute top-1/2 start-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center opacity-0 w-[150%] h-[150%]">

                                        <svg class="animate-spin" width="144" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="animation-duration: 22s;">

                                            <path [attr.id]="'circlePath' + $index" fill="none" d="M 10, 50a 40,40 0 1,1 80,0a 40,40 0 1,1 -80,0">
                                            </path>

                                            <text font-size="9.4" class="fill-white tracking-[-0.05em]">

                                                <textPath [attr.href]="'#circlePath' + $index">
                                                    {{ item.text }}
                                                </textPath>

                                            </text>
                                        </svg>

                                    </div>

                                </swiper-slide>
                                }
                            </swiper-container>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
