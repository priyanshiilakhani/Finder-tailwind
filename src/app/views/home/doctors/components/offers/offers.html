<section class="bg-info dark">
    <div class="container">
        <div class="lg:pt-12 pt-6">
            <h2 class="font-semibold lg:text-4.5xl md:text-3.5xl text-2.5xl pt-12 mb-8 text-white">Special offers</h2>
        </div>

                <div class="grid lg:grid-cols-2 grid-cols-1 md:gap-6">
            <div>
                <div class="grid lg:grid-cols-1 md:grid-cols-2 grid-cols-1 gap-4">
                    @for (item of offersData; track $index) {
                    <div class="cursor-pointer bg-white/10 rounded-xl lg:p-8 p-6 group grid grid-cols-12 gap-6">
                        <div class="col-span-9">
                            <h3 class="md:text-2xl text-xl font-semibold mb-2">
                                <a class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300 text-white" [routerLink]="[]">
                                    {{ item.title }}
                                </a>
                            </h3>

                            <p class="text-sm text-white opacity-75 mb-6">
                                {{ item.description }}
                            </p>

                            <div class="flex items-center">
                                <span class="text-primary-border-subtle font-semibold md:text-2xl text-xl pe-1 me-2">
                                    {{ item.price }}
                                </span>

                                <del class="text-white opacity-75">
                                    {{ item.oldPrice }}
                                </del>
                            </div>
                        </div>

                        <div class="col-span-3">
                            <img [src]="item.image" [alt]="item.title" class="rounded-xl w-26.5">
                        </div>
                    </div>
                    }
                </div>
                <div class="lg:mb-12 mb-6 inline-flex mt-4">
                    <a [routerLink]="[]" class=" text-white bg-primary hover:bg-primary-hover py-3.5 px-6 font-semibold transition-all duration-300 rounded-md">More offers</a>
                </div>
            </div>

            <div class="md:-mt-90 lg:mt-0 -mt-20">
                <img src="assets/img/home/doctors/offers/main.png" alt="Image" class="lg:w-full lg:ms-0 mx-auto md:ms-auto md:w-69 w-50">
            </div>
        </div>
    </div>
</section>
