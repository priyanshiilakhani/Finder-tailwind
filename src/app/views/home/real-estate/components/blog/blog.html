<section class="lg:pb-28 md:pb-18 pb-12">
    <div class="container">
        <div class="flex items-start justify-between gap-4 pb-6 mb-4">
            <h2 class="text-center lg:text-4.5xl md:text-3.5xl text-2.5xl font-semibold text-default-900">Latest blogs</h2>
            <div class="inline-flex items-center gap-2">
                <a routerLink="/blog-layout/v1" class="hover:underline flex items-center me-1 font-semibold">View all
                    <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
                </a>
            </div>
        </div>

        <div class="swiper pb-5">
            <swiper-container class="swiper-wrapper lg:mb-0 mb-15" [config]="swiperConfig" init="false">
                @for (item of blogData; track $index) {
                <swiper-slide>
                    <a [routerLink]="item.link" class="group">
                        <div class="rounded-md overflow-hidden mb-6">
                            <img [src]="item.image" alt="Category image" class="w-full h-full object-cover transition-transform duration-500 rounded-md group-hover:scale-110 z-0">
                        </div>

                        <div class="mb-3">
                            <a class="text-secondary text-xs uppercase" [routerLink]="[]">
                                {{ item.category }}
                            </a>
                        </div>

                        <h3 class="text-default-900 font-semibold text-xl mb-2">
                            <a class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300" [routerLink]="item.link">
                                {{ item.title }}
                            </a>
                        </h3>

                        <p class="text-sm mb-4">
                            {{ item.description }}
                        </p>

                        <div class="text-sm gap-3">
                            <a class="font-semibold" [routerLink]="[]">
                                by {{ item.author }}
                            </a>

                            <span class="text-secondary">
                                {{ item.date }}
                            </span>
                        </div>
                    </a>
                </swiper-slide>
                }
            </swiper-container>
            <!-- Pagination (Bullets) -->
            <div id="blog-pagination" class="swiper-pagination static mt-3 mt-sm-4"></div>
        </div>
    </div>
</section>
