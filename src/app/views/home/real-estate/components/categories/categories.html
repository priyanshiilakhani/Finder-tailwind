<section class="md:py-12 py-12">
    <div class="container">
        <div class="border border-border lg:py-6 py-4 rounded-md">
            <div class="grid lg:grid-cols-6 md:grid-cols-3 grid-cols-2">

                @for (item of categoriesData; track $index) {
                <div class="py-2 group">
                    <div class="flex-col items-center py-2 px-4 border-e border-border">

                        <h3 class="text-default-900 text-center mb-2 text-xl font-semibold">
                            <a [routerLink]="item.link" class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300">
                                {{ item.title }}
                            </a>
                        </h3>

                        <div class="flex items-center justify-center gap-1 text-sm text-body-color">
                            <iconify-icon [icon]="item.icon" class="text-base"></iconify-icon>
                            {{ item.offers }}
                        </div>

                    </div>
                </div>
                }


                <div class="py-2 group">
                    <div class="flex flex-col items-center justify-center hs-dropdown relative py-2 px-4 [--auto-close:inside]">

                        <h3 class="text-default-900 text-center text-xl font-semibold">
                            <button aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown" class="flex flex-col items-center">
                                More
                                <svg class="w-4 h-4 mt-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>
                        </h3>

                        <div class="hs-dropdown-menu transition-[opacity,margin] duration-200 px-4 py-3 my-2 hs-dropdown-open:opacity-100 opacity-0 hidden w-auto absolute start-1/2 -translate-x-1/2 mt-2 bg-body-bg border border-border shadow-custom rounded-lg z-40">

                            @for (item of moreItemsData; track $index) {
                            <a class="block py-2 px-4 text-sm text-default-800 hover:bg-default-100 rounded-md" [routerLink]="[]">
                                {{ item }}
                            </a>
                            }

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
