 <section class="relative flex w-full overflow-hidden">
        <div class="relative shrink-0 z-20 start-1/2 -translate-x-1/2 -mt-1 -mb-2 max-w-full sm:max-w-[1200px] lg:max-w-[1600px] 2xl:max-w-[1920px]">
            <div class="sm:-mx-2 lg:-mx-5 2xl:mx-0">
                <img-comparison-slider class="focus:outline-none text-primary -mx-2 sm:-mx-3 lg:-mx-5 2xl:mx-0" style="--divider-width: .125rem; --divider-color: currentColor" tabindex="0">
                    <!-- Dark Mode -->
                    <figure slot="first" class="relative">
                        <img src="assets/img/intro/dark-mode.jpg" alt="Dark Mode" class="w-full h-auto object-cover">
                        <figcaption class="absolute top-0 start-1/2 -translate-x-1/2 pt-2 sm:pt-3 md:pt-4 lg:pt-5 xl:mt-3 2xl:mt-5 pe-12 sm:pe-20 md:pe-[200px]" data-bs-theme="dark">
                            <span class="inline-flex items-center text-sm sm:text-base bg-neutral-900 text-white rounded px-3 py-2">
                                <iconify-icon icon="lucide:moon" class="text-lg me-2 -ms-1"></iconify-icon>
                                Dark mode
                            </span>
                        </figcaption>
                    </figure>

                    <!-- Light Mode -->
                    <figure slot="second" class="relative">
                        <img src="assets/img/intro/light-mode.jpg" alt="Light Mode" class="w-full h-auto object-cover">
                        <figcaption class="absolute top-0 start-1/2 -translate-x-1/2 pt-2 sm:pt-3 md:pt-4 lg:pt-5 xl:mt-3 2xl:mt-5 ps-12 sm:ps-20 md:ps-[200px]">
                            <span class="inline-flex items-center text-sm sm:text-base bg-white text-gray-900 rounded px-3 py-2">
                                <iconify-icon icon="lucide:sun" class="text-lg me-2 -ms-1"></iconify-icon>
                                Light mode
                            </span>
                        </figcaption>
                    </figure>

                    <!-- Slider handle -->
                    <div slot="handle" class="w-8 sm:w-[42px]">
                        <svg class="text-primary rounded-full" width="42" height="42" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg">
                            <circle fill="currentColor" cx="21" cy="21" r="21"></circle>
                            <path fill="white" d="M25.5019 19.7494H15.9147V15.9146L11.1211 20.7081L15.9147 25.5017V21.6669H25.5019V25.5017L30.2955 20.7081L25.5019 15.9146V19.7494Z"></path>
                        </svg>
                    </div>
                 </img-comparison-slider>
            </div>
        </div>

        <!-- Background halves -->
        <div class="absolute top-0 start-0 w-1/2 h-full bg-neutral-900"></div>
        <div class="absolute top-0 end-0 w-1/2 h-full bg-[#eef1f6]"></div>
    </section>
