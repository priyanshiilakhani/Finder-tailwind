<section class="lg:pt-30 md:pt-24 pt-20 lg:pb-24 md:pb-18 pb-12 bg-default-100 dark:bg-white/3">
    <div class="container">
        <div class="pt-4 md:mb-12 mb-6 md:w-162 w-full mx-auto text-center">
            <h1 class="lg:text-5xl md:text-4.5xl text-3xl mb-4 md:pb-2 text-default-900 font-bold">Directory & Listings <span class="text-nowrap">Tailwind CSS 4 HTML</span> Template</h1>
            <p class="text-lg">Maximize your directory or listings platform with our premium Tailwind css template, designed for top performance and easy customization.</p>
        </div>
        <div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-6">
            @for (item of homeDemoData; track $index) {
            <div class="w-full bg-body-bg p-1 rounded-xl relative group">
                <a [routerLink]="item.link">
                    <div class="rounded-xl overflow-hidden">
                        <img [src]="item.lightImage" class="block dark:hidden w-full h-full object-cover transition-transform duration-500 rounded-xl group-hover:scale-105 z-0" [alt]="item.title">

                        <img [src]="item.darkImage" class="hidden dark:block w-full h-full object-cover transition-transform duration-500 rounded-xl group-hover:scale-105 z-0" [alt]="item.title">
                    </div>

                    <div class="absolute bottom-0 start-0 p-3">
                        <span class="m-1 bg-default-900 inline-flex justify-center items-center text-body-bg group-hover:bg-default-950 rounded-full py-2 px-3.5 text-sm font-semibold relative">
                            {{ item.title }}

                            <iconify-icon icon="lucide:arrow-up-right" class="ms-2 opacity-100 translate-y-0 transition-all duration-300 text-base group-hover:opacity-0 group-hover:-translate-y-5">
                            </iconify-icon>

                            <iconify-icon icon="lucide:arrow-up-right" class="ms-2 absolute end-3.5 opacity-0 translate-y-5 transition-all duration-300 text-base group-hover:opacity-100 group-hover:translate-y-0">
                            </iconify-icon>
                        </span>
                    </div>
                </a>
            </div>
            }
        </div>
    </div>
</section>
