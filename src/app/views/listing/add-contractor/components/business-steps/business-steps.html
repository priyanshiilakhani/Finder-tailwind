<section class="lg:mt-20 md:mt-17 mt-15 bg-info">
  <div class="container">
    <div class="overflow-auto">
      <div class="py-4 md:my-1 gap-1 flex items-center">

        @for (item of contractorStepData; track $index) {

          @if ($index < currentStep) {

            <a
              [routerLink]="item.route"
              class="flex items-center gap-4 whitespace-nowrap group"
            >
              <div class="flex items-center justify-center bg-white rounded-full shrink-0 w-11 h-11">
                <iconify-icon
                  [icon]="item.completedIcon"
                  class="text-lg text-info"
                ></iconify-icon>
              </div>

              <div class="text-sm font-semibold text-white hover:underline">
                {{ item.title }}
              </div>
            </a>

          }

          @else if ($index === currentStep) {

            <div class="flex items-center gap-4 whitespace-nowrap">

              <div class="flex items-center justify-center bg-white rounded-full shrink-0 w-11 h-11">
                <iconify-icon
                  [icon]="item.icon"
                  class="text-lg text-info"
                ></iconify-icon>
              </div>

              <div class="text-sm font-semibold text-white">
                {{ item.title }}
              </div>

            </div>

          }

          @else {

            <div class="flex items-center gap-4 whitespace-nowrap">

              <div class="flex items-center justify-center border border-white rounded-full shrink-0 w-11 h-11">
                <iconify-icon
                  [icon]="item.icon"
                  class="text-lg text-white"
                ></iconify-icon>
              </div>

              <div class="text-sm font-semibold text-white">
                {{ item.title }}
              </div>

            </div>

          }
 
          @if ($index !== contractorStepData.length - 1) {
            <hr class="w-22 text-white opacity-25 my-0 mx-2">
          }

        }

      </div>
    </div>
  </div>
</section>
