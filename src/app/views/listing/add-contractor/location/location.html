<app-navbar7 />
<add-contractor-business-steps />
<section class="py-12 lg:mb-4">
  <div class="container">
    <div class="grid lg:grid-cols-12 grid-cols-1 gap-6 lg:pb-12 md:pb-6 pb-2 lg:pt-4 md:pt-2">
      <div class="lg:col-span-7 col-span-1">
        <h1 class="mb-4 md:pb-2 lg:text-2.5xl md:text-2xl text-xl font-semibold text-default-900">
          What is your business address?
        </h1>
        <div class="grid md:grid-cols-2 grid-cols-1 gap-6 mb-6">
          <div>
            <label class="block text-sm text-default-900 font-semibold mb-2">Country *</label>
            <select
              class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75"
            >
              <option value="">Select country</option>
              <optgroup label="Africa">
                <option value="Nigeria">Nigeria</option>
                <option value="South Africa">South Africa</option>
                <option value="Kenya">Kenya</option>
                <option value="Egypt">Egypt</option>
                <option value="Ethiopia">Ethiopia</option>
              </optgroup>

              <optgroup label="Asia">
                <option value="China">China</option>
                <option value="India">India</option>
                <option value="Japan">Japan</option>
                <option value="South Korea">South Korea</option>
                <option value="Saudi Arabia">Saudi Arabia</option>
              </optgroup>

              <optgroup label="Europe">
                <option value="Germany">Germany</option>
                <option value="France">France</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="Italy">Italy</option>
                <option value="Spain">Spain</option>
              </optgroup>

              <optgroup label="North America">
                <option value="United States" selected="">United States</option>
                <option value="Canada">Canada</option>
                <option value="Mexico">Mexico</option>
                <option value="Jamaica">Jamaica</option>
                <option value="Costa Rica">Costa Rica</option>
              </optgroup>

              <optgroup label="South America">
                <option value="Brazil">Brazil</option>
                <option value="Argentina">Argentina</option>
                <option value="Colombia">Colombia</option>
                <option value="Chile">Chile</option>
                <option value="Peru">Peru</option>
              </optgroup>

              <optgroup label="Oceania">
                <option value="Australia">Australia</option>
                <option value="New Zealand">New Zealand</option>
                <option value="Papua New Guinea">Papua New Guinea</option>
                <option value="Fiji">Fiji</option>
                <option value="Solomon Islands">Solomon Islands</option>
              </optgroup>
            </select>
          </div>

          <div>
            <label class="block text-sm text-default-900 font-semibold mb-2">City *</label>
            <select
              class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75"
            >
              <option value="">Select city</option>
              <option value="New York" selected="">New York</option>
              <option value="Los Angeles">Los Angeles</option>
              <option value="Chicago">Chicago</option>
              <option value="Houston">Houston</option>
              <option value="Phoenix">Phoenix</option>
              <option value="Philadelphia">Philadelphia</option>
              <option value="San Antonio">San Antonio</option>
              <option value="San Diego">San Diego</option>
              <option value="Dallas">Dallas</option>
              <option value="San Jose">San Jose</option>
              <option value="Austin">Austin</option>
              <option value="Jacksonville">Jacksonville</option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-default-900 font-semibold mb-2">District *</label>
            <select
              class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75"
            >
              <option value="">Select district</option>
              <option value="Manhattan">Manhattan</option>
              <option value="Brooklyn" selected="">Brooklyn</option>
              <option value="The Bronx">The Bronx</option>
              <option value="Staten Island">Staten Island</option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-default-900 font-semibold mb-2">Zip code *</label>
            <input
              type="text"
              id="zip"
              value="11237"
              required
              class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm text-default-900 font-semibold mb-2">Address line *</label>
          <input
            type="text"
            id="address"
            value="929 Hart Street"
            required
            class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75"
          />
        </div>

        <h2
          class="pt-12 pb-2 mb-4 text-default-900 font-semibold lg:text-2.5xl md:text-2xl text-xl"
        >
          Where do you want to work?
        </h2>

        <div class="mb-6">
          <label class="block text-sm text-default-900 font-semibold mb-2"
            >Where do you offer your services? *</label
          >

          <div class="relative">
            <iconify-icon
              icon="lucide:search"
              class="absolute top-1/2 start-0 -translate-y-1/2 text-lg ms-4"
            ></iconify-icon>

            <input
              type="password"
              id="area-search"
              placeholder="Search area where you provide your services"
              required
              class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent pe-4.5 ps-10 py-2.75"
            />
          </div>
        </div>

        <label class="block text-sm text-default-900 font-semibold mb-2"
          >Where do you offer your services? *</label
        >
        <div class="flex gap-2 flex-wrap">
          <button
            class="text-xs py-1.5 px-4 border border-border font-semibold rounded-full inline-flex justify-center items-center text-default-700 transition-all duration-500 ease-in-out hover:border-default-800"
          >
            <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
            Brooklyn
          </button>

          <button
            class="text-xs py-1.5 px-4 border border-border font-semibold rounded-full inline-flex justify-center items-center text-default-700 transition-all duration-500 ease-in-out hover:border-default-800"
          >
            <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
            Manhattan
          </button>

          <button
            class="text-xs py-1.5 px-4 border border-border font-semibold rounded-full inline-flex justify-center items-center text-default-700 transition-all duration-500 ease-in-out hover:border-default-800"
          >
            <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
            Staten Island
          </button>
        </div>

        <div class="pt-12">
          <a
            routerLink="/add-contractor/services"
            class="py-3.5 px-6 inline-flex justify-center items-center rounded-md text-body-bg bg-default-800 transition-all duration-300 hover:bg-default-900 font-semibold"
            >Go to services<lucide-icon name="chevron-right" class="size-4.5 ms-1"></lucide-icon
          ></a>
        </div>
      </div>
