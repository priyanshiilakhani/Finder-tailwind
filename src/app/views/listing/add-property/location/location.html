<app-navbar7 />
<section class="md:mt-20 mt-10 pt-6 pb-12 lg:py-12 h-full">
    <div class="container">
        <div class="grid lg:grid-cols-3 grid-cols-1 gap-6 pt-4 pb-12 md:mb-0 mb-6">
            <div>
                <app-property-sidebar [currentStepIndex]="1" />
            </div>

            <div class="lg:col-span-2">
                <h1 class="lg:text-3.5xl md:text-2.5xl text-2xl text-default-900 font-semibold lg:pb-2 pb-1 mb-4">Location</h1>
                <div class="grid md:grid-cols-2 grid-cols-1 gap-6 mb-6">
                    <div class="lg:pb-4">
                        <label class="block text-sm text-default-900 font-semibold mb-2">Country *</label>

                        <select required class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75">
                            <option value="">Select country</option>
                            @for (group of countryGroupsData; track $index) {

                            <optgroup [label]="group.continent">

                                @for (country of group.countries; track country.value) {

                                <option [value]="country.value" [selected]="country.selected">

                                    {{ country.name }}

                                </option>

                                }

                            </optgroup>

                            }
                        </select>
                    </div>

                    <div class="lg:pb-4">
                        <label class="block text-sm text-default-900 font-semibold mb-2">City *</label>
                        <select required class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75">
                            @for (city of citiesData; track $index) {

                            <option [value]="city.value" [selected]="city.selected">
                                {{ city.label }}
                            </option>

                            }

                        </select>
                    </div>

                    <div class="lg:pb-4">
                        <label class="block text-sm text-default-900 font-semibold mb-2">District *</label>
                        <select required class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75">
                            <option value="">Select district</option>
                            <option value="Manhattan">Manhattan</option>
                            <option value="Brooklyn" selected>Brooklyn</option>
                            <option value="The Bronx">The Bronx</option>
                            <option value="Staten Island">Staten Island</option>
                        </select>
                    </div>

                    <div class="lg:pb-4">
                        <label class="block text-sm text-default-900 font-semibold mb-2">Zip code *</label>
                        <input type="text" id="zip" value="11237" required class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75">
                    </div>
                </div>

                <div class="pb-6 md:mb-2">
                    <label class="block text-sm text-default-900 font-semibold mb-2">Street address *</label>
                    <input type="text" id="address" value="929 Hart Street" required class="w-full rounded-lg border border-default-300 dark:border-white/20 bg-transparent px-4.5 py-2.75">
                </div>

                <h2 class="text-default-900 font-semibold mb-2">Display on the map</h2>
                <p class="text-sm mb-4">You can change the position of the mark on the map.</p>

                <div class="aspect-[21/9] bg-default-200 border border-border rounded-lg overflow-hidden z-0" #mapContainer></div>
            </div>
        </div>
    </div>
</section>

<footer class="fixed bottom-0 pb-4 w-full bg-body-bg">
    <div class="h-1 w-full rounded-none bg-default-200">
        <div class="h-1 bg-default-900" style="width: 28.57%"></div>
    </div>

    <div class="container pt-4">
        <div class="flex justify-between">

            <a routerLink="/add-property/type" class="relative inline-flex items-center px-5 py-2.5 border border-default-900 bg-transparent rounded-md text-default-900 text-sm font-medium transition group hover:text-body-bg hover:bg-default-900">
                <iconify-icon icon="lucide:arrow-left" class="me-2 opacity-100 -translate-x-0 transition-all duration-300 group-hover:opacity-0 group-hover:-translate-x-5"></iconify-icon>
                Back
                <iconify-icon icon="lucide:arrow-left" class="me-2 absolute start-5 opacity-0 translate-x-5 transition-all duration-300 group-hover:opacity-100 group-hover:translate-x-0"></iconify-icon>
            </a>

            <a routerLink="/add-property/photos" class="relative inline-flex items-center px-5 py-2 rounded-md bg-default-900 text-body-bg font-medium hover:bg-default-800 transition group text-sm">
                Next
                <iconify-icon icon="lucide:arrow-right" class="ms-2 opacity-100 translate-x-0 transition-all duration-300   group-hover:opacity-0 group-hover:translate-x-5"></iconify-icon>
                <iconify-icon icon="lucide:arrow-right" class="ms-2 absolute end-5 opacity-0 -translate-x-5 transition-all duration-300   group-hover:opacity-100 group-hover:translate-x-0"></iconify-icon>
            </a>
        </div>
    </div>
</footer>
