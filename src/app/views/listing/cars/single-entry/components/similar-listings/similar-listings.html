<section class="md:py-12 py-6 my-4">
  <div class="container">
    <div class="flex md:items-center items-start justify-between gap-4 md:mb-8 mb-6">
      <h2 class="lg:text-3.5xl md:text-2.5xl text-2xl font-semibold text-default-900">
        You may be interested in
      </h2>
      <div class="inline-flex items-center gap-2">
        <a
          routerLink="/listings-grid-cars"
          class="hover:underline flex items-center text-nowrap me-1 font-semibold"
          >View all
          <iconify-icon icon="lucide:chevron-right" class="text-lg"></iconify-icon>
        </a>
      </div>
    </div>

    <div class="swiper">
      <swiper-container [config]="swiperConfig" init="false"  class="lg:mb-0 mb-12">
        @for (item of carGridListingData; track $index) {
          <swiper-slide class="h-auto">
            <a routerLink="/single-entry-cars" class="group">
              <div class="bg-default-100/70 dark:bg-white/3 rounded-md">
                <div class="rounded-tl-md rounded-tr-md w-full h-full overflow-hidden relative">
                  <img
                    [src]="item.image"
                    alt="Image"
                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 z-0 rounded-tl-md rounded-tr-md"
                  />

                  <div class="absolute top-0 start-0 z-10 flex flex-col gap-1 pt-2 ps-2 mt-2 ms-2">
                    @if (item.isVerified) {
                      <div
                        class="bg-info text-white text-xs inline-flex item-center font-medium px-2 py-0.5 rounded items-center"
                      >
                        Verified
                        <iconify-icon icon="lucide:shield" class="ms-1"></iconify-icon>
                      </div>
                    }

                    <div>
                      <p
                        class="bg-warning inline-flex w-auto text-white text-xs px-2 py-0.5 rounded"
                      >
                        {{ item.condition }}
                      </p>
                    </div>
                  </div>
                </div>

                <div class="pb-4 pt-6 px-6">
                  <div class="flex justify-between items-center mb-2">
                    <div class="text-xs text-secondary me-4">
                      {{ item.date }}
                    </div>

                    <div class="flex gap-2">
                      <div class="hs-tooltip [--placement:top] inline-block">
                        <button
                          type="button"
                          class="hs-tooltip-toggle flex justify-center items-center size-8 border border-default-300 dark:border-white/20 rounded-full hover:border-body-color transition-all duration-300"
                        >
                          <iconify-icon
                            icon="lucide:heart"
                            width="14"
                            height="14"
                            class="text-body-color"
                          ></iconify-icon>

                          <span
                            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-body-bg rounded-md"
                            role="tooltip"
                          >
                            Wishlist
                          </span>
                        </button>
                      </div>

                      <div class="hs-tooltip [--placement:top] inline-block">
                        <button
                          type="button"
                          class="hs-tooltip-toggle flex justify-center items-center size-8 border border-default-300 dark:border-white/20 rounded-full hover:border-body-color transition-all duration-300"
                        >
                          <iconify-icon
                            icon="lucide:bell"
                            width="14"
                            height="14"
                            class="text-body-color"
                          ></iconify-icon>

                          <span
                            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-body-bg rounded-md"
                            role="tooltip"
                          >
                            Notify
                          </span>
                        </button>
                      </div>

                      <div class="hs-tooltip [--placement:top] inline-block">
                        <button
                          type="button"
                          class="hs-tooltip-toggle flex justify-center items-center size-8 border border-default-300 dark:border-white/20 rounded-full hover:border-body-color transition-all duration-300"
                        >
                          <iconify-icon icon="lucide:repeat"  width="14"
                            height="14" class="text-body-color"></iconify-icon>

                          <span
                            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-body-bg rounded-md"
                            role="tooltip"
                          >
                            Compare
                          </span>
                        </button>
                      </div>
                    </div>
                  </div>

                  <h3 class="mb-2 text-default-900 font-semibold">
                    <a
                      class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300 me-1"
                      routerLink="/single-entry-cars"
                    >
                      {{ item.title }}
                    </a>

                    <span class="text-xs font-normal text-secondary"> ({{ item.year }}) </span>
                  </h3>

                  <div class="text-default-900 font-semibold">
                    {{ item.price }}
                  </div>
                </div>

                <div class="pb-6 px-6">
                  <div class="pt-4 border-t border-border">
                    <div class="grid grid-cols-2 gap-2">
                      <div class="flex gap-2 items-center text-sm">
                        <iconify-icon icon="lucide:map-pin" class="text-body-color"></iconify-icon>

                        {{ item.location }}
                      </div>

                      <div class="flex gap-2 items-center text-sm">
                        <iconify-icon icon="lucide:gauge" class="text-body-color"></iconify-icon>

                        {{ item.mileage }}
                      </div>

                      <div class="flex gap-2 items-center text-sm">
                        <iconify-icon icon="lucide:fuel" class="text-body-color"></iconify-icon>

                        {{ item.fuelType }}
                      </div>

                      <div class="flex gap-2 items-center text-sm">
                        <iconify-icon
                          icon="tabler:manual-gearbox"
                          class="text-body-color"
                        ></iconify-icon>

                        {{ item.transmission }}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </a>
          </swiper-slide>
        }
      </swiper-container>

      <div id="similar-list-pagination" class="swiper-pagination static mt-3 mt-lg-4"></div>
    </div>
  </div>
</section>
