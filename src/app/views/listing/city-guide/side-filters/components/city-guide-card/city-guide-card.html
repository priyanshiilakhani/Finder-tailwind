<div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-6">
    @for (item of cityGuideCardData; track $index) {
        <div class="group">
            <a [routerLink]="item.routeLink">
                <div class="border-default-200 border dark:border-white/20 group rounded-md">
                    <div class="rounded-tl-md rounded-tr-md overflow-hidden relative">
                        <img
                            [src]="item.image"
                            alt=""
                            class="w-full h-full object-cover transition-transform duration-500 rounded-tl-md rounded-tr-md group-hover:scale-105 z-0"
                        >

                        <div class="absolute top-0 end-0 z-10 opacity-0 group-hover:opacity-100 transition pt-2 pe-2 mt-2 me-2">
                            <button
                                type="button"
                                class="size-8 bg-white text-dark rounded-full shadow flex items-center justify-center"
                            >
                                <iconify-icon icon="lucide:heart"></iconify-icon>
                            </button>
                        </div>
                    </div>

                    <div class="pt-4 pb-2 px-4">
                        <span class="rounded-md inline-block font-medium text-default-600 bg-default-100 dark:bg-white/3 text-xs px-2 py-1 text-decoration-none mb-2">
                            {{ item.category }}
                        </span>

                        <h3 class="text-xl font-semibold pt-1 mb-2">
                            <a
                                class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300"
                                [routerLink]="item.routeLink"
                            >
                                {{ item.title }}
                            </a>
                        </h3>

                        <p class="text-sm">
                            {{ item.description }}
                        </p>
                    </div>

                    <div class="pb-4 px-4">
                        <ul class="flex-nowrap flex gap-4 text-sm items-center">
                            <li class="flex items-center gap-1">
                                <ul class="flex items-center gap-0.5">
                                        <li>
                                            <lucide-icon
                                                name="star"
                                                class="size-4 fill-warning text-warning"
                                            ></lucide-icon>
                                        </li>
                                </ul>

                                <span class="text-sm">{{ item.rating }}</span>

                                <span class="text-xs text-secondary">
                                    ({{ item.reviewCount }})
                                </span>
                            </li>

                            <li class="flex items-center gap-1">
                                <lucide-icon
                                    name="map-pin"
                                    class="size-3.5"
                                ></lucide-icon>

                                <span>{{ item.distanceFromCenter }}</span>
                            </li>
                        </ul>

                        <div class="text-default-900 font-semibold pt-4">
                            {{ item.price }}
                        </div>
                    </div>
                </div>
            </a>
        </div>
    }
</div>
