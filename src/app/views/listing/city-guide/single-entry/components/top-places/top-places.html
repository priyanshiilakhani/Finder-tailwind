<div class="sticky top-26">
  <div class="lg:w-104 w-full ms-auto">
    <h3 class="text-xl mb-6 text-default-900 font-semibold">Top places nearby</h3>

    <div class="flex flex-col gap-8">
      @for (item of placeCardData; track $index) {
        <div class="group">
          <a [routerLink]="item.route">
            <div class="flex gap-4">
              <div class="rounded-md w-28 overflow-hidden relative">
                <img
                  [src]="item.image"
                  alt="Image"
                  class="w-28 object-cover overflow-hidden transition-transform duration-500 group-hover:scale-105 z-0 rounded-md"
                />
              </div>

              <div class="pt-1">
                <h3 class="text-base font-semibold mb-1">
                  <a
                    class="relative after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-300"
                    [routerLink]="item.route"
                  >
                    {{ item.title }}
                  </a>
                </h3>

                <div class="flex items-center gap-1 mb-2">
                  <ul class="flex items-center gap-1">
                      <li class="list-none">
                        <lucide-icon
                          name="star"
                          class="fill-warning text-warning size-4"
                        ></lucide-icon>
                      </li>
                  </ul>

                  <span class="text-sm">{{ item.rating }}</span>

                  <span class="text-xs text-secondary self-end"> ({{ item.reviewCount }}) </span>
                </div>

                <ul class="flex-nowrap flex gap-2 text-sm mb-0">
                  <li class="flex items-center gap-1 me-2">
                    <lucide-icon name="credit-card" class="size-3.5"></lucide-icon>

                    {{ item.price }}
                  </li>

                  <li class="flex items-center gap-1">
                    <lucide-icon name="map-pin" class="size-3"></lucide-icon>

                    <span class="truncate w-15 lg:w-full">
                      {{ item.distance }}
                    </span>
                  </li>
                </ul>
              </div>
            </div>
          </a>
        </div>
      }
    </div>
  </div>
</div>
