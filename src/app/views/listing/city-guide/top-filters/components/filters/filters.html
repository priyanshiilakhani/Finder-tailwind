<div class="grid md:grid-cols-12 grid-cols-2 lg:gap-6 gap-4 mb-4 items-center">
  <div class="lg:col-span-10 md:col-span-9 col-span-1">
    <div class="grid lg:grid-cols-4 md:grid-cols-3 col-span-1 lg:gap-6 gap-4">
      <div class="relative">
        <!-- Button -->
        <button
          type="button"
          (click)="toggleTypeDropdown()"
          class="flex items-center justify-between w-full px-4 py-2.5 border border-default-900 text-default-700 rounded-full bg-transparent"
        >
          <div class="flex items-center">
            <iconify-icon icon="lucide:house" class="text-base me-2"></iconify-icon>

            <span class="text-sm">Type</span>

            @if (typeCount > 0) {
              <span class="ms-1 text-sm"> ({{ typeCount }}) </span>
            }
          </div>

          <iconify-icon icon="lucide:chevron-down"></iconify-icon>
        </button>

        <!-- Dropdown -->
        <div
          [class.hidden]="!typeDropdownOpen"
          class="absolute z-20 mt-2 w-full bg-white border border-default-200 rounded-lg shadow-lg p-3"
        >
          <div class="flex flex-col gap-2">
            @for (item of propertyTypeFilterData; track $index) {
              <label
                class="flex items-center justify-between text-sm text-default-700 cursor-pointer"
              >
                <div class="flex items-center">
                  <input
                    type="checkbox"
                    [id]="item.id"
                    [(ngModel)]="item.checked"
                    class="w-4 h-4 checked:text-dark border-default-300 dark:border-white/20 rounded"
                  />

                  <span class="ms-2">
                    {{ item.label }}
                  </span>
                </div>

                <span class="text-xs text-default-500">
                  {{ item.totalProperties }}
                </span>
              </label>
            }
          </div>
        </div>
      </div>

      <div class="relative md:block hidden">
        <iconify-icon
          icon="lucide:map-pin"
          class="absolute start-4 top-1/2 -translate-y-1/2 text-default-500 z-10"
        ></iconify-icon>
        <select
          class="w-full rounded-full border border-default-900 dark:border-white/20 ps-10 pe-4 text-sm py-2.25 bg-transparent text-default-700"
          aria-label="Location select"
        >
          <option value="">Any location</option>
          <option value="Paris">Paris</option>
          <option value="Rome">Rome</option>
          <option value="Barcelona" selected>Barcelona</option>
          <option value="London">London</option>
          <option value="Amsterdam">Amsterdam</option>
          <option value="Berlin">Berlin</option>
          <option value="Prague">Prague</option>
          <option value="Venice">Venice</option>
          <option value="Vienna">Vienna</option>
          <option value="Florence">Florence</option>
        </select>
      </div>

      <div class="relative md:block hidden">
        <lucide-icon
          name="calendar"
          class="absolute start-2 top-1/2 -translate-y-1/2 text-default-500 size-3.5"
        ></lucide-icon>
        <input
          id="datepicker"
          mwlFlatpickr
          [options]="flatPickrOptions"
          type="date"
          placeholder="Choose date"
          class="w-full text-sm rounded-full border border-default-300 dark:border-white/20 ps-10 pe-4 py-2.25 text-default-700 bg-transparent"
        />
      </div>

      <div class="relative lg:block hidden">
        <!-- Button -->
        <button
          type="button"
          (click)="togglePriceDropdown()"
          class="flex items-center justify-between w-full px-4 py-2.5 border border-default-300 text-default-700 rounded-full bg-transparent"
        >
          <div class="flex items-center">
            <iconify-icon icon="lucide:dollar-sign" class="text-base me-2"></iconify-icon>

            <span class="text-sm">Price range</span>

            @if (priceCount > 0) {
              <span class="ms-1 text-sm"> ({{ priceCount }}) </span>
            }
          </div>

          <svg
            class="w-4 h-4 text-default-500"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </button>

        <!-- Dropdown -->
        <div
          [class.hidden]="!priceDropdownOpen"
          class="absolute z-20 mt-2 w-full bg-white border border-default-200 rounded-lg shadow-lg p-3"
        >
          <div class="flex flex-col gap-2">
            @for (item of priceRangeFilterData; track $index) {
              <label
                class="flex items-center justify-between text-sm text-default-700 cursor-pointer"
              >
                <div class="flex items-center">
                  <input
                    type="checkbox"
                    [id]="item.id"
                    [(ngModel)]="item.checked"
                    class="w-4 h-4 checked:text-dark border-default-300 rounded"
                  />

                  <span class="ms-2">
                    {{ item.label }}
                  </span>
                </div>

                <span class="text-xs text-default-500">
                  {{ item.totalProperties }}
                </span>
              </label>
            }
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="lg:col-span-2 md:col-span-3 col-span-1">
    <button
      type="button"
      class="inline-flex items-center text-sm font-semibold text-default-800 w-full disabled:opacity-50 disabled:pointer-events-none"
      aria-haspopup="dialog"
      aria-expanded="false"
      aria-controls="filtersOffcanvas"
      data-hs-overlay="#filtersOffcanvas"
    >
      <iconify-icon icon="tabler:plus" width="18" height="18" class="me-2"></iconify-icon>
      <a [routerLink]="[]" class="hover:underline"> More filters</a>
    </button>
  </div>
</div>

<div class="mb-2 pb-1 flex gap-4 pt-2">
  <div class="flex gap-2 pb-4 whitespace-nowrap overflow-x-auto lg:w-auto w-70 md:w-165">
    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      Apartments
    </button>

    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      Hotels
    </button>

    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      Resorts
    </button>

    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      Cottages
    </button>

    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      Barcelona
    </button>

    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      5 <lucide-icon name="star" class="fill-warning text-warning ms-1 me-1 size-3"></lucide-icon>
    </button>

    <button
      class="text-xs py-2 px-4 bg-default-100 font-semibold dark:bg-default-200 rounded-full inline-flex justify-center items-center transition-all duration-500 ease-in-out hover:bg-default-200 dark:hover:bg-default-300"
    >
      <lucide-icon name="x" class="size-3.5 me-1"></lucide-icon>
      4 <lucide-icon name="star" class="fill-warning text-warning ms-1 me-1 size-3"></lucide-icon>
    </button>
  </div>

  <div class="pb-4">
    <a class="underline hover:no-underline text-default-800 text-xs" [routerLink]="[]">Clear all</a>
  </div>
</div>

<div>
  <div class="flex items-center gap-6 pb-4 md:mb-4 mb-2">
    <div class="text-sm whitespace-nowrap hidden md:inline">Showing 95 results</div>

    <div class="relative md:ms-auto w-42.5">
      <lucide-icon
        name="arrow-up-down"
        class="absolute top-1/2 start-2 -translate-y-1/2 z-10 size-3.5"
      ></lucide-icon>
      <select
        class="w-full rounded-full border bg-transparent border-default-300 dark:border-white/20 ps-10 pe-18 py-2 text-sm text-default-700"
      >
        <option value="Popular" selected>Popular</option>
        <option value="Rating">Rating</option>
        <option value="Price asc">Price asc</option>
        <option value="Price desc">Price desc</option>
      </select>
    </div>

    <div class="ms-auto md:ms-0 flex items-center">
      <a href="#map" class="relative inline-flex items-center">
        <iconify-icon icon="lucide:map" class="text-base me-2"></iconify-icon>
        <a [routerLink]="[]" class="hover:underline text-sm text-default-800 font-medium">
          <span>View on <span class="hidden sm:inline">the</span> map</span></a
        >
      </a>
    </div>
  </div>
</div>
