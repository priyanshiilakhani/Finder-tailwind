<div class="mb-12 lg:pb-4 md:pb-2 pb-0">
    <h2 class="text-2xl font-semibold text-default-900 mb-6">Business details</h2>
   <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
    @for (section of contractorInfoData; track $index) {

        <div>
            <h5 class="text-sm font-semibold pb-1 mb-2">
                {{ section.title }}
            </h5>

            <ul class="text-sm space-y-2">

                @for (item of section.items; track $index) {

                    <li>
                        @if (item.label) {
                            {{ item.label }}
                        }

                        <span
                            [class]="item.highlight
                                ? 'font-medium text-default-900'
                                : ''">

                            {{ item.value }}
                        </span>
                    </li>
                }

            </ul>
        </div>
    }
</div>
</div>
