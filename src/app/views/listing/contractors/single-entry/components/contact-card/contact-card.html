<div class="lg:sticky lg:top-25">
    <div id="contactForm" class="hs-overlay lg:static [--auto-close:lg] lg:block lg:translate-x-0 lg:end-auto lg:bottom-auto hs-overlay-open:translate-x-0 translate-x-full transition-all duration-300 transform  hidden fixed top-0 end-0 bottom-0 z-60 bg-body-bg lg:w-auto w-87" role="dialog" tabindex="-1" aria-label="Sidebar">
        <div class="flex flex-col sticky top-0">
            <header class="py-4 px-6 lg:px-0 lg:py-0 flex justify-between items-center gap-x-2 lg:border-none border-b border-default-200">
                <a class="focus:outline-hidden focus:opacity-80 " [routerLink]="[]" aria-label="Brand">
                    <h4 class="text-xl font-semibold text-default-900 lg:hidden block">Contact Mike Gardner</h4>
                </a>

                <div class="lg:hidden -me-2">
                    <button type="button" class="" data-hs-overlay="#contactForm">
                        <iconify-icon icon="lucide:x" height="20" width="20"></iconify-icon>
                        <span class="sr-only">Close</span>
                    </button>
                </div>
            </header>

            <nav class="h-full overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full">
                <div class="w-full flex flex-col flex-wrap px-6 lg:px-0 pb-4 lg:pb-0 pt-6">

                    <div class="lg:p-2 lg:bg-default-100 lg:dark:bg-white/3 rounded-md">
                        <div class="lg:p-6">
                            <h4 class="text-xl font-semibold text-default-900 text-center pb-1 mb-2 lg:block hidden">Contact Mike Gardner</h4>
                            <p class="text-sm text-center mb-6">Please fill out the form to contact a specialist</p>
                            <form class="space-y-4" novalidate>
                                <!-- Name -->
                                <div>
                                    <input type="text" placeholder="Name *" required class="w-full rounded-md border border-default-300 dark:border:white/20 bg-body-bg px-3 py-2 text-sm">
                                    <p class="hidden mt-1 text-sm text-primary">Please enter your name!</p>
                                </div>

                                <!-- Phone -->
                                <div>
                                    <input type="tel" placeholder="Phone number *" required class="w-full rounded-md border border-default-300 dark:border:white/20 bg-body-bg px-3 py-2 text-sm">
                                    <p class="hidden mt-1 text-sm text-primary">Please enter your phone number!</p>
                                </div>

                                <!-- Zip -->
                                <div>
                                    <input type="text" placeholder="Zip code" class="w-full rounded-md border border-default-300 dark:border:white/20 bg-body-bg px-3 py-2 text-sm">
                                </div>

                                <!-- Message -->
                                <div>
                                    <textarea rows="5" placeholder="Message *" required class="w-full rounded-md border border-default-300 dark:border:white/20 bg-body-bg px-3 py-2 text-sm"></textarea>
                                    <p class="hidden mt-1 text-sm text-primary">Please write your message!</p>
                                </div>

                                <!-- Button -->
                                <button type="submit" class="w-full rounded-md bg-primary px-6 py-3.5 text-white text-base font-medium hover:bg-primary-hover">
                                    Send message
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </div>
</div>
