<div class="grid md:grid-cols-12 grid-cols-2 grid-rows-2 lg:gap-6 gap-4 mb-12">
    @for (item of contractorGalleryData; track $index; let isFirst = $first) {

    <div class="group relative overflow-hidden rounded-xl" [class]="isFirst 
                ? 'md:col-span-8 col-span-2 row-span-2' 
                : 'col-span-1 md:col-span-2 row-span-1'">

        <img [src]="item" class="w-full h-full object-cover rounded-xl transition-transform duration-300 group-hover:scale-105" />

        <div class="absolute inset-0 flex items-center justify-center bg-black/30 opacity-0 transition-opacity duration-300 group-hover:opacity-100 rounded-xl">

            <a [href]="item" class="image-popup after:absolute after:inset-0 after:z-1 rounded-xl" appGlightbox>

                <div class="absolute inset-0 flex justify-center items-center z-20 opacity-0 group-hover:opacity-100 transition duration-300">

                    <iconify-icon icon="lucide:zoom-in" class="text-white text-3xl relative z-30">
                    </iconify-icon>

                </div>
            </a>
        </div>
    </div>
    }
</div>
