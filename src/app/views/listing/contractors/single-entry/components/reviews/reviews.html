<div class="lg:pt-6 md:pt-4 pt-0">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold text-default-900">Reviews</h2>
        <button class="border border-default-900 text-default-800 text-sm px-4 py-2 rounded-md inline-flex items-center justify-center hover:bg-default-900 font-medium hover:text-body-bg transition-all duration-300">
            <iconify-icon icon="lucide:edit-3" class="text-base -ms-1 me-2"></iconify-icon>
            Add review
        </button>
    </div>
</div>

<div class="mb-4 pb-4 grid md:grid-cols-12 grid-cols-1 gap-6">
    <div class="md:col-span-4 col-span-1 bg-default-100 dark:bg-white/3 rounded-md p-6 flex flex-col justify-center items-center h-full!">
        <div class="text-4xl font-semibold text-default-900 pb-2 mb-1">4.5</div>
        <div class="flex justify-center gap-1 text-sm mb-2">
            <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
            <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
            <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
            <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
            <lucide-icon name="star-half" class="text-warning size-4"></lucide-icon>
        </div>
        <div class="text-sm">76 reviews</div>
    </div>

    <div class="md:col-span-8 col-span-1">
        <div class="flex flex-col gap-4">
            <div class="flex items-center gap-2">
                <div class="flex items-center text-sm gap-1">
                    5<lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                </div>

                <div class="flex-1 h-1 bg-default-200 rounded-full overflow-hidden" aria-label="Five stars">
                    <div class="bg-warning h-1 rounded-full" style="width: 58%"></div>
                </div>

                <div class="text-sm text-nowrap text-right w-10">44</div>
            </div>

            <div class="flex items-center gap-2">
                <div class="flex items-center text-sm gap-1">
                    4<lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                </div>

                <div class="flex-1 h-1 bg-default-200 rounded-full overflow-hidden" aria-label="Four stars">
                    <div class="bg-warning h-1 rounded-full" style="width: 22.4%"></div>
                </div>

                <div class="text-sm text-nowrap text-right w-10">17</div>
            </div>

            <div class="flex items-center gap-2">
                <div class="flex items-center text-sm gap-1">
                    3<lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                </div>

                <div class="flex-1 h-1 bg-default-200 rounded-full overflow-hidden" aria-label="Three stars">
                    <div class="bg-warning h-1 rounded-full" style="width: 12%"></div>
                </div>

                <div class="text-sm text-nowrap text-right w-10">9</div>
            </div>

            <div class="flex items-center gap-2">
                <div class="flex items-center text-sm gap-1">
                    2<lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                </div>

                <div class="flex-1 h-1 bg-default-200 rounded-full overflow-hidden" aria-label="Two stars">
                    <div class="bg-warning h-1 rounded-full" style="width: 5%"></div>
                </div>

                <div class="text-sm text-nowrap text-right w-10">4</div>
            </div>

            <div class="flex items-center gap-2">
                <div class="flex items-center text-sm gap-1">
                    1<lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                </div>

                <div class="flex-1 h-1 bg-default-200 rounded-full overflow-hidden" aria-label="One star">
                    <div class="bg-warning h-1 rounded-full" style="width: 2.6%"></div>
                </div>

                <div class="text-sm text-nowrap text-right w-10">2</div>
            </div>
        </div>
    </div>
</div>

<div class="flex gap-6 flex-col">
    @for (review of reviewsData; track $index) {
    <div class="flex flex-col gap-2 mb-2 sm:mb-2">
        <div class="flex items-center gap-4 mb-1">
            <h6 class="text-default-900 font-semibold">
                {{ review.name }}
            </h6>

            <span class="text-xs text-default-500">
                {{ review.date }}
            </span>
        </div>

        <div class="flex gap-1 text-sm mb-1">
            @for (star of [1, 2, 3, 4, 5]; track $index) {
            @if (star <= review.rating) { <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                } @else {
                <lucide-icon name="star" class="text-warning size-4"></lucide-icon>
                }
                }
        </div>

        <p class="text-sm mb-1">
            {{ review.review }}
        </p>

        <div class="flex items-center">
            <button type="button" class="flex items-center py-2 text-sm text-default-500 transition -me-1">

                <lucide-icon name="thumbs-up" class="size-3.5 me-1">
                </lucide-icon>

                {{ review.likes }}
            </button>

            <div class="h-5 w-px bg-default-300 dark:bg-white/20 mx-4 my-2"></div>

            <button type="button" class="flex items-center py-2 text-sm text-default-500 transition -ms-1">

                <lucide-icon name="thumbs-down" class="size-3.5 me-1">
                </lucide-icon>

                {{ review.dislikes }}
            </button>
        </div>
    </div>
    }
</div>
