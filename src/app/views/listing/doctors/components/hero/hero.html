<h1 class="lg:text-3.5xl md:text-2.5xl text-2xl text-default-900 font-semibold pb-2 mb-6">Physicians in Chicago</h1>
<div class="flex flex-wrap items-center lg:gap-6 gap-4 md:mb-6 mb-5">

    <div class="w-full md:w-37/100 lg:w-1/5">
        <div class="relative">
            <lucide-icon name="search" class="absolute top-1/2 start-2 -translate-y-1/2 text-default-500 size-3.5"></lucide-icon>
            <input type="search" value="Physician" placeholder="Search doctor" class="w-full border border-default-300 dark:border-white/30 rounded-md ps-10 pe-3 py-2 bg-transparent focus:ring-2 text-sm">
        </div>
    </div>

    <div class="w-full md:w-4/12 lg:w-3/20">
        <div class="relative">
            <lucide-icon name="map-pin" class="absolute top-1/2 start-2 -translate-y-1/2 text-default-500 size-3.5"></lucide-icon>
            <select class="w-full border border-default-300 dark:border-white/30 rounded-md ps-10 pe-8 py-2 bg-transparent focus:ring-2 text-sm appearance-none">
                <option>Any location</option>
                <option>New York</option>
                <option>Los Angeles</option>
                <option selected>Chicago</option>
                <option>Houston</option>
                <option>Phoenix</option>
                <option>Philadelphia</option>
                <option>San Antonio</option>
                <option>San Diego</option>
                <option>Dallas</option>
                <option>San Jose</option>
            </select>
        </div>
    </div>

    <div class="w-full sm:w-5/12 md:w-3/12 lg:w-2/12">
        <div class="relative">
            <lucide-icon name="navigation" class="absolute top-1/2 start-2 -translate-y-1/2 text-default-500 size-3.5"></lucide-icon>
            <select class="w-full border border-default-300 dark:border-white/30 rounded-md ps-10 pe-8 py-2 bg-transparent focus:ring-2 text-sm appearance-none">
                <option>Any radius</option>
                <option selected>5 mi</option>
                <option>10 mi</option>
                <option>20 mi</option>
                <option>30 mi</option>
                <option>40 mi</option>
                <option>50 mi</option>
            </select>
        </div>
    </div>

    <div class="flex gap-6 lg:w-4/12">
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="peer hidden">
            <span class="w-11 h-6 rounded-full bg-default-300 peer-checked:bg-success relative after:content-[''] after:absolute after:top-0.75 after:start-0.75 after:w-4.5 after:h-4.5 after:bg-white after:rounded-full after:transition-all peer-checked:after:translate-x-5"></span>
            <span class="text-sm">Online</span>
        </label>

        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="peer hidden">
            <span class="w-11 h-6 rounded-full bg-default-300 peer-checked:bg-success relative after:content-[''] after:absolute after:top-0.75 after:start-0.75 after:w-4.5 after:h-4.5 after:bg-white after:rounded-full after:transition-all peer-checked:after:translate-x-5"></span>
            <span class="text-sm">Visit clinic</span>
        </label>
    </div>
</div>
