<section class="lg:py-12 md:pt-6 pt-4 pb-12 lg:my-4">
    <div class="container">
        <h2 class="lg:mb-12 md:mb-8 mb-4 lg:text-4.5xl md:text-3.5xl text-2.5xl font-semibold text-default-900" style="max-width: 525px">Get new customers with Finder easily!</h2>

        <div class="grid md:grid-cols-2 grid-cols-1 gap-6">
            <div class="w-full h-full max-w-141 rounded-md overflow-hidden md:block hidden">
                <img src="assets/img/about/v1/account-cta.jpg" alt="Image" class="w-full h-full object-cover">
            </div>

            <div>

                <div class="hs-accordion-group">
                    @for (item of accordionData; track $index) {
                    <div class="hs-accordion group" [class.active]="item.expanded" [id]="item.headingId">

                        <button class="hs-accordion-toggle inline-flex justify-between items-center gap-x-3 w-full text-start text-xl font-semibold text-default-900 py-5" [attr.aria-expanded]="item.expanded" [attr.aria-controls]="item.id">

                            <span class="relative text-default-900 font-semibold after:absolute after:bottom-0 after:start-0 after:w-full after:opacity-0 group-hover:after:opacity-100 after:h-0.25 after:bg-current hover:after:w-full after:transition-all after:duration-100">
                                {{ item.title }}
                            </span>

                            <iconify-icon icon="lucide:chevron-down" class="hs-accordion-active:hidden block size-5 text-default-800">
                            </iconify-icon>

                            <iconify-icon icon="lucide:chevron-up" class="hs-accordion-active:block hidden size-5 text-default-800">
                            </iconify-icon>
                        </button>

                        <div [id]="item.id" class="hs-accordion-content w-full overflow-hidden transition-[height] duration-300" [class.hidden]="!item.expanded" role="region" [attr.aria-labelledby]="item.headingId">

                            <p>
                                {{ item.content }}
                            </p>

                        </div>
                    </div>
                    }
                </div>

                <div class="lg:pt-12 pt-8">
                    <div class="flex gap-6 items-center">
                        <a class="py-3.5 px-6 rounded-md text-nowrap bg-primary text-white inline-flex items-center font-semibold transition-all duration-300 hover:bg-primary-hover" routerLink="/account/signup">
                            Create an account
                            <lucide-icon name="chevron-right" class="size-4.5 ms-1"></lucide-icon>
                        </a>

                        <div class="flex items-center text-secondary text-sm">
                            <iconify-icon icon="lucide:clock" class="text-base me-2"></iconify-icon>
                            5 min to complete
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
