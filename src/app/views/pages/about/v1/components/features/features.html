<section class="lg:py-12 md:pt-6 pt-4 pb-12 lg:my-4">
    <div class="container">
        <h2 class="lg:mb-12 md:mb-8 mb-2 lg:text-4.5xl md:text-3.5xl text-2.5xl text-default-900 font-semibold">The values we live by</h2>

        <div class="grid md:grid-cols-2 grid-cols-1 lg:gap-x-24 lg:gap-y-24 md:gap-x-12 md:gap-y-6 gap-4">
            @for (item of featureData; track $index) {
            <div class="lg:flex items-center">
                <div [innerHTML]="getSafeSvg(item.svg)"></div>

                <div class="lg:ps-6">
                    <h3 class="mb-4 text-default-900 text-xl font-semibold">
                        {{ item.title }}
                    </h3>

                    <p class="text-sm">
                        {{ item.description }}
                    </p>
                </div>
            </div>
            }
        </div>
    </div>
</section>
