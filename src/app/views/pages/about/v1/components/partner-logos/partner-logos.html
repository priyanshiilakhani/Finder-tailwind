<section class="lg:py-12 md:pt-6 pt-4 pb-12 lg:my-4">
    <div class="container">
        <div class="grid lg:grid-cols-12 grid-cols-1 lg:gap-6 gap-0 items-center">
            <div class="lg:col-span-3 col-span-1 lg:mb-0 mb-4">
                <h2 class="text-xl text-default-900 font-semibold">Big companies trust Finder</h2>
            </div>

            <div class="lg:col-span-9 col-span-1">
                <div class="grid md:grid-cols-5 grid-cols-2 lg:gap-12 gap-3">
                    @for (logo of companyLogosData; track $index) {
                    <a class="inline-flex" [routerLink]="[]" style="max-width: 140px" [attr.aria-label]="logo.ariaLabel">

                        <div [innerHTML]="getSafeSvg(logo.svg)"></div>
                    </a>
                    }
                </div>
            </div>
        </div>
    </div>
</section>
