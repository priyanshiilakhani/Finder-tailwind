<section class="lg:py-12 md:pt-6 pt-4 pb-12 lg:my-4">
    <div class="container">
        <h2 class="lg:mb-12 md:mb-10 mb-7 pt-12 text-default-900 font-semibold lg:text-4.5xl md:text-3.5xl text-2.5xl">Our principles</h2>
        <div class="grid md:grid-cols-2 grid-cols-1 gap-6">
            @for (column of principlesData; track $index) {
            <div class="flex flex-col gap-6">

                @for (item of column.items; track $index) {
                <div class="relative rounded-xl overflow-hidden">
                    <div class="absolute inset-0 z-20 p-6">
                        <div class="lg:p-4">
                            <h3 class="text-white lg:mb-4 mb-3 lg:text-2.5xl text-2xl font-semibold">
                                {{ item.title }}
                            </h3>

                            <p class="text-white lg:text-lg text-sm">
                                {{ item.description }}
                            </p>
                        </div>
                    </div>

                    <div class="md:hidden aspect-[300/200]"></div>

                    <div class="hidden md:block lg:hidden" [class]="item.aspectMd">
                    </div>

                    <div class="hidden lg:block" [class]="item.aspectLg">
                    </div>

                    <img [src]="item.image" alt="Image" class="absolute inset-0 w-full h-full object-cover">

                    <span class="absolute inset-0 z-10 bg-gradient-to-b from-black/60 to-black/0"></span>
                </div>
                }

            </div>
            }
        </div>
    </div>
</section>
