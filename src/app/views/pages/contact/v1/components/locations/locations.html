<section class="lg:py-12 lg:my-12 py-6">
  <div class="container">
    <h2 class="md:mb-12 mb-8 text-default-900 font-semibold lg:text-4.5xl md:text-3.5xl text-2.5xl">
      Our offices
    </h2>
    <div class="grid lg:grid-cols-4 md:grid-cols-3 grid-cols-2 lg:gap-12 gap-6">
      @for (item of officeLocationData; track $index) {
        <div>
          <div [innerHTML]="getSafeSvg(item.svg)"></div>

          <h3 class="text-xl text-default-900 font-semibold py-2 my-1">
            {{ item.countryName }}
          </h3>

          <p class="pb-2 mb-1" [innerHTML]="item.officeAddress"></p>

          <a class="inline-flex items-center text-default-900 font-medium" [routerLink]="[]">
            <span class="hover:underline me-1 text-sm">Show on map</span>

            <iconify-icon icon="lucide:chevron-right" class="text-base mt-1"></iconify-icon>
          </a>
        </div>
      }
    </div>
  </div>
</section>
