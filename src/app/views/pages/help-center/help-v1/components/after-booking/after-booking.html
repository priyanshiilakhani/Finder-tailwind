<ul class="md:border-s border-border md:ps-6 pt-6 flex flex-col gap-4">
  @for (item of afterBookingArticleData; track $index) {
    <li>
      <a
        [routerLink]="item.link"
        class="flex items-center text-base font-normal py-1 text-default-800 hover:text-default-900 transition-all duration-300 ease-in-out"
      >
        <div>
          <iconify-icon
            icon="lucide:chevron-right"
            class="text-lg me-2"
          ></iconify-icon>
        </div>

        <span class="hover:underline transition-all duration-300 ease-in-out">
          {{ item.title }}
        </span>
      </a>
    </li>
  }
</ul>
